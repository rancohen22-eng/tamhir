<style>
  :root{
    --bg:#f2f5f9; --card:#fff; --ink:#0e1c2e; --muted:#5b6b7f;

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Roboto,"Heebo",Arial,sans-serif;font-size:15px;line-height:1.45}
  .hidden{display:none!important}
  button{font-family:inherit}
  #lock{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,var(--brand),var(--brand2))}
  #lock .panel{width:100%;max-width:380px;background:var(--card);border-radius:16px;padding:26px 22px;box-shadow:0 10px 30px rgba(0,0,0,.25);text-align:center}

  #lock h1{margin:6px 0 2px;font-size:18px;color:var(--brand)}
  #lock p{margin:0 0 16px;color:var(--muted);font-size:13px}
  .fld{width:100%;padding:11px 13px;font-size:15px;border:1px solid var(--line);border-radius:10px;margin:6px 0;background:#fff;color:var(--ink)}
  .fld:focus{outline:2px solid var(--brand2);border-color:transparent}
  #unlockBtn{width:100%;margin-top:10px;padding:12px;font-size:16px;font-weight:700;color:#fff;background:var(--brand);border:0;border-radius:10px;cursor:pointer}
  #lockErr{color:var(--danger);font-size:13px;min-height:18px;margin-top:8px}
  .demo{margin-top:14px;font-size:12px;color:var(--muted);text-align:start;background:var(--chip);border-radius:10px;padding:10px 12px}
  .demo b{color:var(--brand)} .demo code{background:#fff;padding:1px 5px;border-radius:5px}
  header.app{position:sticky;top:0;z-index:20;background:linear-gradient(160deg,var(--brand),var(--brand2));color:#fff;padding:10px 14px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
  header.app .row{display:flex;align-items:center;gap:10px}
  .logobadge{background:#fff;border-radius:8px;padding:4px 8px;line-height:0;flex:0 0 auto}
  .logobadge img{height:22px;display:block}
  .logotext{font-weight:800;color:var(--brand);font-size:15px;padding:2px 4px}
  header.app h1{margin:0;font-size:15px;font-weight:700;white-space:nowrap}
  .spacer{flex:1}
  .hbtn{color:#fff;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.4);font-size:13px;font-weight:600;padding:6px 10px;border-radius:8px;cursor:pointer;white-space:nowrap}
  .hbtn:hover{background:rgba(255,255,255,.28)}
  .bell{position:relative}
  .bell .count{position:absolute;top:-6px;inset-inline-end:-6px;background:var(--danger);color:#fff;font-size:11px;font-weight:700;min-width:17px;height:17px;border-radius:9px;padding:0 4px;display:flex;align-items:center;justify-content:center}
  .whoami{font-size:12px;opacity:.9;white-space:nowrap}
  nav.tabs{display:flex;gap:4px;overflow-x:auto;margin-top:8px}
  nav.tabs button{flex:0 0 auto;background:rgba(255,255,255,.14);color:#fff;border:0;padding:7px 12px;border-radius:8px 8px 0 0;font-size:13.5px;cursor:pointer;white-space:nowrap}
  nav.tabs button.sel{background:var(--bg);color:var(--brand);font-weight:700}
  main{max-width:1080px;margin:0 auto;padding:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(16,28,46,.05)}
  .card h2{margin:0 0 10px;font-size:16px;color:var(--brand)}
  .card h3{margin:14px 0 8px;font-size:14px;color:var(--brand)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .kpi{background:var(--chip);border-radius:10px;padding:12px}
  .kpi .n{font-size:16px;font-weight:800;color:var(--brand)}
  .kpi .l{font-size:12px;color:var(--muted)}
  label.f{display:block;font-size:12.5px;color:var(--muted);margin:8px 0 2px;font-weight:600}
  .btn{background:var(--brand);color:#fff;border:0;padding:9px 15px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  .btn.ok{background:var(--accent)} .btn.warn{background:var(--warn)} .btn.danger{background:var(--danger)}
  .btn.sm{padding:6px 10px;font-size:13px}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:8px 9px;text-align:start;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:700;font-size:12px;background:#f7fafc}
  tbody tr{cursor:pointer} tbody tr:hover{background:#f7fafc}
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:700}

  .st-QUOTE_RECEIVED{background:#e6f0ff;color:#1e4fa0}.st-APPROVED{background:#e4f5ec;color:#0e7a4e}
  .st-TICKETED{background:#dff3e7;color:#0a5e3c}.st-CANCEL_REQUESTED{background:#fde8e6;color:#9a2b23}

  .cobrand{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--chip);border-radius:10px;margin-bottom:10px}

  .notif{padding:10px;border-bottom:1px solid var(--line);font-size:13.5px;display:flex;gap:8px;align-items:flex-start;cursor:pointer}

  .muted{color:var(--muted)}
  .rowflex{display:flex;gap:14px;flex-wrap:wrap}.rowflex>div{flex:1;min-width:170px}
  .pill{display:inline-block;background:var(--chip);color:var(--brand);border-radius:999px;padding:2px 9px;font-size:12px;font-weight:600}

<script>
"use strict";
/* ============================================================================
   מערכת תיעוד הזמנות טיסות (ארקיע) — חזית מחוברת ל-REST (ORDS) על Oracle.
   רב-משתמשי אמיתי. ה-API: /ords/arkia/api/  (ראו bookings/api/install_api.sql)
   ========================================================================== */

const API = 'https://ga86f4ac04ab998-arkiabkg.adb.il-jerusalem-1.oraclecloudapps.com/ords/arkia/api/';
const BUILD = '2026-07-19.7';   // חותמת גרסה — לאימות שהדפדפן טוען את הבנייה העדכנית

async function api(path, params){
  // POST form-urlencoded = "simple request" → ללא CORS preflight.
  // timeout כדי שבקשה תקועה (מובייל) לא תשאיר את המסך חסום; לעולם לא זורק.
  try {
    const ctl = new AbortController();
    const to = setTimeout(()=>ctl.abort(), 20000);
    const r = await fetch(API + path, { method:'POST', body:new URLSearchParams(params||{}), signal:ctl.signal });
    clearTimeout(to);
    const txt = await r.text();
    try { return JSON.parse(txt); } catch(e){ return {ok:false, error:'bad_response: '+txt.slice(0,200)}; }
  } catch(e){ return {ok:false, error:'network_error'}; }
}
function spin(on){ document.getElementById('spin').classList.toggle('hidden', !on); }
spin(false);   // ודא שאין ספינר חוסם בטעינה
try{ document.getElementById('lk_build').textContent='build '+BUILD; }catch(e){}

/* ── מצב ── */

let BOOT = null;    // {departments,agents,currencies,statuses,wet_operators,airports}
let VIEW = { tab:'bookings', lang:'he', bookingId:null, editing:false };
let STMAP = {};     // status_code -> {he,en,terminal}
let APMAP = {};     // iata -> {name_he,name_en}
let UNREAD = 0;
// deep-link מהמייל: /ords/arkia/api/app#b=123 → פתיחת ההזמנה לאחר התחברות
let PENDING_BID = (function(){ const m=(location.hash||'').match(/b=(\d+)/); return m?Number(m[1]):null; })();

const T = {

    markRead:"סמן הכל כנקרא",noNotif:"אין התראות",estPrice:"מחיר משוער",chooseAgent:"בחר סוכן",required:"שדה חובה",

    admin:"ניהול",departments:"מחלקות",users:"משתמשים",agents:"סוכנים",currencies:"מטבעות",roles:"תפקידים",
    name:"שם",code:"קוד",email:"אימייל",add:"הוסף",changePw:"שנה סיסמה",saved:"נשמר",role:"תפקיד",symbol:"סמל",
    pax:"מס' נוסעים",prefTime:"שעה מועדפת",route:"נתיב",origin:"מוצא",dest:"יעד",wetOp:"מפעיל רטוב",

    active:"פעיל",inactive:"לא פעיל",editUser:"עריכת משתמש",resetPw:"איפוס סיסמה",
    tempPwTitle:"סיסמה זמנית נוצרה",tempPwMsg:"מסרו למשתמש את הסיסמה הזמנית. תוצג פעם אחת בלבד:",
    pwSecNote:"סיסמאות נשמרות כ-hash חד-כיווני ולכן לא ניתן להציגן. איפוס יוצר סיסמה זמנית (וכשיופעל המייל — קישור איפוס).",

  en:{title:"Flight Booking by Teltos",logout:"Logout",bookings:"Bookings",newB:"New Booking",notifications:"Notifications",
    dept:"Department",status:"Status",initiator:"Initiator",agent:"Agent",approver:"Approver",openDate:"Open Date",

    approve:"Approve",reject:"Reject",ticket:"Ticket",requestCancel:"Request Cancel",confirmCancel:"Confirm Cancel",

    markRead:"Mark all read",noNotif:"No notifications",estPrice:"Estimated price",chooseAgent:"Choose agent",required:"Required",
    download:"Download",view:"View",cobrandNote:"With",search:"Search...",required2:"Please fill required fields",
    finance:"Finance",total:"Total bookings",open:"Open",ticketed:"Ticketed",cancelled:"Cancelled",exportExcel:"Export Excel (CSV)",

function t(k){ return (T[VIEW.lang]||T.he)[k]||k; }
function stLabel(code){ const s=STMAP[code]; return s?(VIEW.lang==='en'?s.en:s.he):code; }
function stTerminal(code){ const s=STMAP[code]; return s? s.terminal==='Y':false; }
function hasRole(r){ return SES && SES.roles && SES.roles.indexOf(r)>=0; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function curSym(code){ const c=(BOOT.currencies||[]).find(x=>x.code===code); return c?c.symbol:''; }
function deptName(d){ return VIEW.lang==='en'?(d.name_en||d.name_he):d.name_he; }
function apLabel(iata){ if(!iata) return ''; const a=APMAP[iata]; return a?(iata+' · '+(VIEW.lang==='en'?a.name_en:a.name_he)):iata; }
function airportOptions(sel){ return (BOOT.airports||[]).map(a=>`<option value="${a.iata}" ${a.iata===sel?'selected':''}>${esc(a.iata+' · '+(VIEW.lang==='en'?a.name_en:a.name_he))}</option>`).join(''); }
function routeLabel(b){ if(!b.origin&&!b.dest) return t('none'); return (b.origin||'?')+' → '+(b.dest||'?'); }
function isACMI(deptId){ const d=(BOOT.departments||[]).find(x=>x.id===deptId); return d&&d.code==='ACMI'; }

/* ── התחברות + סשן נשמר (localStorage) ── */
const SKEY='arkia_session';
function saveSession(){ try{ localStorage.setItem(SKEY, JSON.stringify(SES)); }catch(e){} }
function clearSession(){ try{ localStorage.removeItem(SKEY); }catch(e){} }
// טוען bootstrap עם הטוקן הנוכחי ומציג את האפליקציה. מחזיר false אם הטוקן פג.
async function enterApp(){
  const boot=await api('bootstrap',{token:SES.token});
  if(!boot.ok) return false;
  BOOT=boot; STMAP={}; (boot.statuses||[]).forEach(s=>STMAP[s.code]={he:s.he,en:s.en,terminal:s.terminal});
  APMAP={}; (boot.airports||[]).forEach(a=>APMAP[a.iata]={name_he:a.name_he,name_en:a.name_en});
  buildAirportList();
  VIEW.tab='bookings';
  if(PENDING_BID){ VIEW.bookingId=PENDING_BID; PENDING_BID=null; try{history.replaceState(null,'',location.pathname);}catch(e){} }
  document.getElementById('lock').classList.add('hidden');
  document.getElementById('appwrap').classList.remove('hidden');
  applyLang(); await refreshUnread(); render();
  return true;
}
async function doLogin(){
  const u=document.getElementById('lk_user').value.trim();
  const p=document.getElementById('lk_pw').value;
  if(!u||!p){ document.getElementById('lockErr').textContent=t('required2'); return; }
  spin(true);
  const res=await api('login',{username:u,password:p});
  if(!res.ok){ spin(false); document.getElementById('lockErr').textContent = res.error==='bad_credentials'?'שם משתמש או סיסמה שגויים / Invalid credentials':('שגיאה: '+res.error); return; }
  SES={token:res.token,user:res.user,roles:res.roles||[],agent_id:res.agent_id};
  VIEW.lang=(res.user.pref_lang||'HE').toLowerCase();
  saveSession();
  const ok=await enterApp();
  spin(false);
  if(!ok){ document.getElementById('lockErr').textContent='שגיאת טעינה / load error'; }
}
function logout(){ clearSession(); SES=null; document.getElementById('appwrap').classList.add('hidden');
  document.getElementById('lock').classList.remove('hidden');
  document.getElementById('lk_user').value=''; document.getElementById('lk_pw').value=''; document.getElementById('lockErr').textContent=''; }
// שחזור סשן בטעינת העמוד (מובייל: להישאר מחובר)
async function tryRestore(){
  // חשוב: לא מציגים ספינר ולא חוסמים את מסך ההתחברות בזמן השחזור.
  // אם הסשן תקף — enterApp יחליף למסך האפליקציה; אם לא/נתקע — מסך ההתחברות נשאר שמיש.
  let s=null; try{ s=JSON.parse(localStorage.getItem(SKEY)||'null'); }catch(e){}
  if(!(s && s.token && s.user)) return;
  SES=s; VIEW.lang=(s.user.pref_lang||'HE').toLowerCase();
  let ok=false; try{ ok=await enterApp(); }catch(e){ ok=false; }
  if(!ok){ clearSession(); SES=null; }
}

function buildAirportList(){
  const dl=document.getElementById('airportsList');
  dl.innerHTML=(BOOT.airports||[]).map(a=>`<option value="${a.iata}">${esc(a.iata+' · '+(VIEW.lang==='en'?a.name_en:a.name_he))}</option>`).join('');
}

/* ── שפה ── */
function applyLang(){
  document.documentElement.lang=VIEW.lang==='en'?'en':'he';
  document.documentElement.dir=VIEW.lang==='en'?'ltr':'rtl';
  document.getElementById('app_title').textContent=t('title');
  document.getElementById('langBtn').textContent=VIEW.lang==='en'?'🇮🇱 עברית':'🇺🇸 English';
  document.getElementById('logoutBtn').textContent=t('logout');
}
function toggleLang(){ VIEW.lang=VIEW.lang==='en'?'he':'en'; buildAirportList(); applyLang(); render(); }

/* ── ניווט ── */
function canInitiate(){ return hasRole('INITIATOR')||hasRole('APPROVER'); }
function tabsFor(){
  const tabs=[['bookings',t('bookings')]];
  if(canInitiate()) tabs.push(['new',t('newB')]);
  if(hasRole('FINANCE')||hasRole('ADMIN')) tabs.push(['finance',t('finance')]);
  if(hasRole('ADMIN')) tabs.push(['admin',t('admin')]);
  if(hasRole('ADMIN')) tabs.push(['log',t('loginLog')]);
  return tabs;
}
async function refreshUnread(){
  const r=await api('notifications',{token:SES.token});
  if(r.ok){ UNREAD=(r.notifications||[]).filter(n=>n.is_read==='N').length; }
  const bc=document.getElementById('bellCount'); bc.textContent=UNREAD; bc.classList.toggle('hidden',UNREAD===0);
}
function roleLabel(r){ return t('R_'+r)||r; }
function render(){
  const roleTxt=(SES.roles||[]).map(roleLabel).join(' · ');
  document.getElementById('whoami').textContent=SES.user.full_name+(roleTxt?(' · '+roleTxt):'');
  const bc=document.getElementById('bellCount'); bc.textContent=UNREAD; bc.classList.toggle('hidden',UNREAD===0);
  const nav=document.getElementById('tabs'); nav.innerHTML='';
  tabsFor().forEach(([k,lbl])=>{ const b=document.createElement('button'); b.textContent=lbl;
    b.className=VIEW.tab===k?'sel':''; b.onclick=()=>{VIEW.tab=k;VIEW.bookingId=null;VIEW.editing=false;render();}; nav.appendChild(b); });
  document.getElementById('foot').textContent=(VIEW.lang==='en'?'Internal use · Arkia · live on Oracle · CI/CD ✓':'לשימוש פנימי · ארקיע · מחובר לאורקל · פריסה אוטומטית ✓')+' · build '+BUILD;
  const app=document.getElementById('app');
  if(VIEW.tab==='notifications') return renderNotifications(app);
  if(VIEW.bookingId) return renderDetail(app,VIEW.bookingId);
  if(VIEW.tab==='new') return renderNew(app);
  if(VIEW.tab==='finance') return renderFinance(app);
  if(VIEW.tab==='admin') return renderAdmin(app);
  if(VIEW.tab==='log') return renderLog(app);
  return renderBookings(app);
}

function editAirport(iata,he,en,country){
  document.getElementById('ap_iata').value=iata; document.getElementById('ap_he').value=he;
  document.getElementById('ap_en').value=en; document.getElementById('ap_country').value=country;
  document.getElementById('ap_iata').scrollIntoView({behavior:'smooth',block:'center'});
}
async function saveAirport(){
  const iata=document.getElementById('ap_iata').value.trim().toUpperCase();
  if(!iata){ document.getElementById('ap_err').textContent=t('required2'); return; }
  spin(true);
  const r=await api('admin/airport/save',{token:SES.token,iata:iata,
    name_he:document.getElementById('ap_he').value.trim(),name_en:document.getElementById('ap_en').value.trim(),
    country:document.getElementById('ap_country').value.trim(),is_active:'Y'});
  await refreshBoot(); spin(false);
  if(!r.ok){ document.getElementById('ap_err').textContent=r.error; return; } render();
}
async function toggleAirport(iata,to){
  spin(true); const r=await api('admin/airport/save',{token:SES.token,iata:iata,is_active:to}); await refreshBoot(); spin(false);
  if(!r.ok){ alert(r.error); return; } render();
}
async function refreshBoot(){ const b=await api('bootstrap',{token:SES.token}); if(b.ok){ BOOT=b; STMAP={}; (b.statuses||[]).forEach(s=>STMAP[s.code]={he:s.he,en:s.en,terminal:s.terminal});
  APMAP={}; (b.airports||[]).forEach(a=>APMAP[a.iata]={name_he:a.name_he,name_en:a.name_en}); buildAirportList(); } }
async function addDept(){

async function saveUser(id){

    full:document.getElementById('eu_fn').value.trim(),email:document.getElementById('eu_em').value.trim(),

function applyFin(){
  const from=document.getElementById('f_from').value, to=document.getElementById('f_to').value;
  const dep=document.getElementById('f_dept').value, st=document.getElementById('f_status').value;
  FIN_VIEW=FIN_ALL.filter(b=>{
    if(from && (!b.ticketing_date || b.ticketing_date<from)) return false;
    if(to && (!b.ticketing_date || b.ticketing_date>to)) return false;
    if(dep && String(b.dept_id)!==String(dep)) return false;
    if(st && b.status!==st) return false;
    return true;
  });
  drawFinance(document.getElementById('app'));
}
function clearFin(){ FIN_VIEW=FIN_ALL.slice(); drawFinance(document.getElementById('app')); }
function toggleCol(k,on){ if(on){ if(!FIN_SELCOLS.includes(k)) FIN_SELCOLS.push(k); } else { FIN_SELCOLS=FIN_SELCOLS.filter(x=>x!==k); } }
function colVal(b,k){
  switch(k){
    case 'seq':return b.seq; case 'status':return stLabel(b.status);
    case 'dept':return VIEW.lang==='en'?b.dept_en:b.dept_he; case 'route':return routeLabel(b);
    case 'pax':return b.pax||1; case 'initiator':return b.initiator; case 'agent':return b.agent||'';
    case 'openDate':return b.open_date||''; case 'departure':return b.departure_date||'';
    case 'ticketingDate':return b.ticketing_date||''; case 'price':return b.price!=null?b.price:'';
    case 'currency':return b.currency; case 'pnr':return b.pnr||'';
    case 'prefTime':return b.pref_time||''; case 'wetOp':return VIEW.lang==='en'?(b.wet_op_en||''):(b.wet_op_he||'');
    case 'updatedBy':return b.updated_by||''; default:return '';
  }
}
function csvEsc(v){ v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function exportCSV(){
  const cols=FIN_COLS.filter(c=>FIN_SELCOLS.includes(c[0]));
  const head=cols.map(c=>t(c[1]));
  const rows=FIN_VIEW.map(b=>cols.map(c=>colVal(b,c[0])));
  const csv='﻿'+[head.join(','),...rows.map(r=>r.map(csvEsc).join(','))].join('\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  const a=document.createElement('a'); a.href=url; a.download='bookings.csv'; a.click(); URL.revokeObjectURL(url);
}
function saveTpl(){
  const name=document.getElementById('tpl_name').value.trim(); if(!name){ alert(t('required2')); return; }
  const o=loadTpls(); o[name]={cols:FIN_SELCOLS.slice()}; saveTpls(o);
  drawFinance(document.getElementById('app'));
}
function loadTpl(){
  const name=document.getElementById('tpl_sel').value; if(!name) return;
  const o=loadTpls(); if(o[name]){ FIN_SELCOLS=o[name].cols.slice(); drawFinance(document.getElementById('app')); }
}
function delTpl(){
  const name=document.getElementById('tpl_sel').value; if(!name) return;
  const o=loadTpls(); delete o[name]; saveTpls(o); drawFinance(document.getElementById('app'));
}

function actionsHtml(b){
  const isAgent = hasRole('AGENT') && SES.agent_id && b.agent_id===SES.agent_id;
  const canQuote = hasRole('AGENT') && SES.agent_id && (b.agent_id===SES.agent_id || !b.agent_id);
  const isApprover = hasRole('APPROVER') && (b.approver_id===SES.user.id || SES.user.dept_id===b.dept_id);
  const isInitiator = b.initiator_id===SES.user.id;
  let h='';
  if(b.status==='AWAITING_QUOTE'&&canQuote) h+=`<button class="btn" onclick="quoteForm(${b.id},'${b.currency}')">${t('submitQuote')}</button>`;
  if(b.status==='QUOTE_RECEIVED'&&isApprover){ h+=`<button class="btn ok" onclick="act(${b.id},'approve')">${t('approve')}</button>`;
    h+=`<button class="btn danger" onclick="actReason(${b.id},'reject')">${t('reject')}</button>`; }
  if(b.status==='APPROVED'&&isAgent) h+=`<button class="btn" onclick="ticketForm(${b.id})">${t('ticket')}</button>`;
  if(b.status==='CANCEL_REQUESTED'&&isAgent) h+=`<button class="btn warn" onclick="act(${b.id},'confirm_cancel')">${t('confirmCancel')}</button>`;
  if((isInitiator||isApprover)&&!stTerminal(b.status)&&b.status!=='CANCEL_REQUESTED'){
    const cl=b.status==='TICKETED'?t('requestCancel'):t('cancelBooking');
    h+=`<button class="btn ghost" onclick="actReason(${b.id},'request_cancel')">${cl}</button>`;
  }
  return h?`<div class="btnrow">${h}</div>`:'';
}
async function act(id,action,extra){
  spin(true); const r=await api('bookings/action',Object.assign({token:SES.token,id:id,action:action},extra||{})); spin(false);
  if(!r.ok){ alert(r.error); return; }
  await refreshUnread(); render();
}
function actReason(id,action){ const r=prompt(t('reason')+':'); if(r===null) return; act(id,action,{reason:r,notes:r}); }

function fileToB64(file){ return new Promise((res,rej)=>{ const rd=new FileReader();
  rd.onload=()=>res(String(rd.result).split(',')[1]||''); rd.onerror=rej; rd.readAsDataURL(file); }); }

function quoteForm(id,cur){
  const curOpts=BOOT.currencies.map(c=>`<option value="${c.code}" ${c.code===cur?'selected':''}>${c.code} ${c.symbol}</option>`).join('');
  document.getElementById('actions').innerHTML=`<h3>${t('submitQuote')}</h3>
    <div class="rowflex"><div><label class="f">${t('price')} *</label><input id="q_price" class="fld" type="number" min="0"></div>
      <div><label class="f">${t('currency')}</label><select id="q_cur" class="fld">${curOpts}</select></div></div>
    <label class="f">${t('tripDetails')}</label><textarea id="q_trip" class="fld" rows="3"></textarea>
    <label class="f">${t('quoteNotes')}</label><textarea id="q_note" class="fld" rows="2"></textarea>
    <label class="f">${t('uploadScreenshot')} *</label><input id="q_file" class="fld" type="file" accept="image/*,application/pdf">
    <div class="btnrow"><button class="btn ok" onclick="submitQuote(${id})">${t('submitQuote')}</button>
      <button class="btn ghost" onclick="render()">${t('back')}</button></div>
    <div id="q_err" style="color:var(--danger);font-size:13px;margin-top:6px"></div>`;
}
async function submitQuote(id){
  const price=document.getElementById('q_price').value, fi=document.getElementById('q_file');
  if(!price||!fi.files.length){ document.getElementById('q_err').textContent=t('required2'); return; }
  spin(true);
  const f=fi.files[0], b64=await fileToB64(f);
  let up=await api('files/upload',{token:SES.token,booking_id:id,kind:'QUOTE_SCREENSHOT',filename:f.name,mime:f.type,data:b64});
  if(!up.ok){ spin(false); document.getElementById('q_err').textContent=up.error; return; }
  const r=await api('bookings/action',{token:SES.token,id:id,action:'submit_quote',price:price,
    currency:document.getElementById('q_cur').value,trip:document.getElementById('q_trip').value||'',
    notes:document.getElementById('q_note').value||''});
  spin(false);
  if(!r.ok){ document.getElementById('q_err').textContent=r.error; return; }
  await refreshUnread(); render();
}
function ticketForm(id){
  document.getElementById('actions').innerHTML=`<h3>${t('ticket')}</h3>
    <div class="rowflex"><div><label class="f">${t('pnr')} *</label><input id="tk_pnr" class="fld"></div></div>
    <label class="f">${t('uploadTicket')} *</label><input id="tk_file" class="fld" type="file" accept="image/*,application/pdf">
    <div class="btnrow"><button class="btn ok" onclick="submitTicket(${id})">${t('ticket')}</button>
      <button class="btn ghost" onclick="render()">${t('back')}</button></div>
    <div id="tk_err" style="color:var(--danger);font-size:13px;margin-top:6px"></div>`;
}
async function submitTicket(id){
  const pnr=document.getElementById('tk_pnr').value.trim(), fi=document.getElementById('tk_file');
  if(!pnr||!fi.files.length){ document.getElementById('tk_err').textContent=t('required2'); return; }
  spin(true);
  const f=fi.files[0], b64=await fileToB64(f);
  let up=await api('files/upload',{token:SES.token,booking_id:id,kind:'FINAL_TICKET',filename:f.name,mime:f.type,data:b64});
  if(!up.ok){ spin(false); document.getElementById('tk_err').textContent=up.error; return; }
  const r=await api('bookings/action',{token:SES.token,id:id,action:'ticket',pnr:pnr,ref:'',tdate:''});
  spin(false);
  if(!r.ok){ document.getElementById('tk_err').textContent=r.error; return; }
  await refreshUnread(); render();
}

/* ── התראות ── */
function openBell(){ VIEW.tab='notifications'; VIEW.bookingId=null; render(); }
async function renderNotifications(app){
  app.innerHTML=`<div class="card"><h2>${t('notifications')}</h2><div class="muted">…</div></div>`;
  const r=await api('notifications',{token:SES.token});
  const list=r.ok?(r.notifications||[]):[];
  const nOn=SES.user.notify_email!=='N';
  app.innerHTML=`<div class="card"><div style="display:flex;align-items:center;gap:10px">
    <h2 style="margin:0;flex:1">${t('notifications')}</h2>
    <button class="btn ghost sm" onclick="markAllRead()">${t('markRead')}</button></div>
    <div style="margin-top:8px;display:flex;align-items:center;gap:10px;font-size:13px">
      <span>${t('emailNotif')}:</span>
      <button class="btn ${nOn?'ok':'ghost'} sm" onclick="toggleNotify()">${nOn?t('emailOn'):t('emailOff')}</button>
    </div>
    <div style="margin-top:10px">${list.map(n=>`<div class="notif ${n.is_read==='N'?'unread':''}" onclick="openFromNotif(${n.booking_id||'null'})">
      <span>🔔</span><div style="flex:1">${esc(n.message)}<div class="t">${n.at}</div></div></div>`).join('')||`<div class="muted">${t('noNotif')}</div>`}</div></div>`;
}
async function toggleNotify(){
  const to=SES.user.notify_email==='N'?'Y':'N';
  spin(true); const r=await api('notify/set',{token:SES.token,on:to}); spin(false);
  if(r.ok){ SES.user.notify_email=to; saveSession(); } render();
}
async function markAllRead(){ spin(true); await api('notifications/read',{token:SES.token}); await refreshUnread(); spin(false); render(); }
async function openFromNotif(bid){ await api('notifications/read',{token:SES.token}); await refreshUnread();
  if(bid){ VIEW.tab='bookings'; VIEW.bookingId=bid; } render(); }
