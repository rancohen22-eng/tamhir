<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>תמחיר טיסות</title>
<style>
  :root{
    --bg:#f2f5f9; --card:#ffffff; --ink:#0e1c2e; --muted:#5b6b7f;
    --brand:#0b3a6b; --brand2:#1668b3; --accent:#0e7a4e; --line:#e2e8f0;
    --danger:#b3261e; --chip:#e8eff7;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,"Heebo",Arial,sans-serif;
    font-size:16px; line-height:1.45;
  }
  .hidden{display:none !important}

  /* ── מסך נעילה ── */
  #lock{
    min-height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px;
    background:linear-gradient(160deg,var(--brand) 0%,var(--brand2) 100%);
  }
  #lock .panel{
    width:100%; max-width:360px; background:var(--card); border-radius:16px;
    padding:28px 22px; box-shadow:0 10px 30px rgba(0,0,0,.25); text-align:center;
  }
  #lock .plane{font-size:40px}
  #lock h1{margin:8px 0 2px; font-size:22px; color:var(--brand)}
  #lock p{margin:0 0 18px; color:var(--muted); font-size:14px}
  #pw{
    width:100%; padding:12px 14px; font-size:17px; border:1px solid var(--line);
    border-radius:10px; text-align:center; direction:ltr;
  }
  #pw:focus{outline:2px solid var(--brand2); border-color:transparent}
  #unlockBtn{
    width:100%; margin-top:12px; padding:13px; font-size:17px; font-weight:600;
    color:#fff; background:var(--brand); border:0; border-radius:10px; cursor:pointer;
  }
  #unlockBtn:disabled{opacity:.6}
  #lockErr{color:var(--danger); font-size:14px; min-height:20px; margin-top:10px}

  /* ── מסך ראשי ── */
  header.app{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(160deg,var(--brand) 0%,var(--brand2) 100%);
    color:#fff; padding:12px 14px 10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  header.app .title{display:flex; align-items:baseline; gap:8px}
  header.app h1{margin:0; font-size:18px}
  header.app .gen{font-size:11px; opacity:.75}
  .months{display:flex; gap:8px; overflow-x:auto; padding:10px 0 2px}
  .month-chip{
    flex:0 0 auto; padding:6px 14px; border-radius:999px; font-size:14px;
    background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.35); cursor:pointer;
  }
  .month-chip.sel{background:#fff; color:var(--brand); font-weight:700; border-color:#fff}
  .searchwrap{position:relative; margin-top:8px}
  #destSearch{
    width:100%; padding:11px 40px 11px 14px; font-size:16px; border:0;
    border-radius:10px;
  }
  .searchwrap .icon{position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--muted)}
  #suggest{
    position:absolute; top:calc(100% + 4px); right:0; left:0; z-index:30;
    background:var(--card); color:var(--ink); border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.2); max-height:45dvh; overflow-y:auto;
  }
  #suggest button{
    display:flex; justify-content:space-between; width:100%; padding:11px 14px;
    background:none; border:0; border-bottom:1px solid var(--line);
    font-size:15px; text-align:right; cursor:pointer;
  }
  #suggest button:last-child{border-bottom:0}
  #suggest .cnt{color:var(--muted); font-size:13px}

  main{padding:12px 12px 40px; max-width:640px; margin:0 auto}

  /* הנחות חישוב */
  #assump{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:10px 12px; margin-bottom:12px; font-size:14px;
  }
  #assump summary{cursor:pointer; font-weight:600; color:var(--brand)}
  #assump .row{display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap}
  #assump label{color:var(--muted)}
  #assump input[type=number]{
    width:76px; padding:6px 8px; font-size:15px; border:1px solid var(--line); border-radius:8px;
  }
  .depbar{margin-bottom:12px; display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap}
  .depbar .seg{background:var(--card)}
  .acfilter{
    background:var(--card); border:1px solid var(--line); border-radius:8px;
    padding:7px 10px; font-size:14px; color:var(--fg, inherit); max-width:60%;
  }
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden}
  .seg button{padding:6px 12px; border:0; background:var(--card); font-size:14px; cursor:pointer}
  .seg button.sel{background:var(--brand); color:#fff; font-weight:600}

  #status{color:var(--muted); text-align:center; margin:26px 8px; font-size:15px}

  /* כרטיס מטוס */
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px; margin-bottom:12px; box-shadow:0 1px 3px rgba(14,28,46,.06);
  }
  .card .head{display:flex; justify-content:space-between; align-items:flex-start; gap:8px}
  .card .ac{font-weight:700; font-size:17px}
  .card .route{
    font-size:13px; color:var(--brand); background:var(--chip);
    border-radius:6px; padding:2px 8px; direction:ltr; white-space:nowrap;
  }
  .card .sub{color:var(--muted); font-size:13px; margin-top:2px}
  .bignums{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0 8px}
  .bignum{background:var(--bg); border-radius:10px; padding:10px 12px}
  .bignum .lbl{font-size:12px; color:var(--muted)}
  .bignum .val{font-size:21px; font-weight:800; color:var(--brand); direction:ltr; text-align:right}
  .bignum.green .val{color:var(--accent)}
  .minis{display:flex; flex-wrap:wrap; gap:6px 14px; font-size:13px; color:var(--muted)}
  .minis b{color:var(--ink); font-weight:600}
  details.brk{margin-top:10px; border-top:1px dashed var(--line); padding-top:8px}
  details.brk summary{cursor:pointer; font-size:14px; color:var(--brand2); font-weight:600}
  .brk table{width:100%; border-collapse:collapse; margin-top:8px; font-size:14px}
  .brk td{padding:5px 2px; border-bottom:1px solid var(--line)}
  .brk td.v{text-align:left; direction:ltr; font-variant-numeric:tabular-nums}
  .brk tr.total td{font-weight:700; border-bottom:0}
  .note{font-size:12px; color:var(--muted); text-align:center; margin-top:18px}
</style>
</head>
<body>

<!-- מסך נעילה -->
<div id="lock">
  <div class="panel">
    <div class="plane">✈️</div>
    <h1>תמחיר טיסות</h1>
    <p>הזינו שם משתמש וסיסמה</p>
    <input id="usr" type="text" autocomplete="username" inputmode="text" placeholder="שם משתמש" autocapitalize="none" spellcheck="false">
    <input id="pw" type="password" autocomplete="current-password" inputmode="text" placeholder="סיסמה">
    <button id="unlockBtn">כניסה</button>
    <div id="lockErr"></div>
  </div>
</div>

<!-- מסך ראשי -->
<div id="app" class="hidden">
  <header class="app">
    <div class="title">
      <h1>✈️ תמחיר טיסות</h1>
      <span class="gen" id="genDate"></span>
      <span class="gen" id="userCount"></span>
    </div>
    <div class="months" id="months"></div>
    <div class="searchwrap">
      <input id="destSearch" type="search" placeholder="חיפוש עיר או קוד IATA… (NEW YORK / JFK)" autocomplete="off">
      <span class="icon">🔎</span>
      <div id="suggest" class="hidden"></div>
    </div>
  </header>

  <main>
    <details id="assump">
      <summary>הנחות חישוב: <span id="assumpSummary"></span></summary>
      <div class="row">
        <span class="seg" id="taxSeg">
          <button data-v="incl" class="sel">כולל מיסי נמל</button>
          <button data-v="ex">ללא מיסי נמל</button>
        </span>
      </div>
      <div class="row">
        <label>שיעור תפוסה %</label>
        <input id="occ" type="number" min="1" max="100" step="1" value="100">
        <label>עמלת הפצה %</label>
        <input id="fee" type="number" min="0" max="30" step="0.5" value="0">
      </div>
    </details>

    <div class="depbar hidden" id="depBar">
      <span class="seg" id="depSeg">
        <button data-v="all" class="sel">כל ההמראות</button>
        <button data-v="tlv">רק מתל אביב</button>
      </span>
      <select id="acFilter" class="acfilter"><option value="all">כל המטוסים</option></select>
    </div>

    <div id="status">בחרו חודש והקלידו יעד כדי להציג את הנתונים</div>
    <div id="results"></div>
    <div class="note">הנתונים מחושבים במערכת התמחיר (arkia-pricing) · לשימוש פנימי בלבד</div>
  </main>
</div>

function b64ToBytes(b64){
  const bin = atob(b64), arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

// derive a key from username+password (per-user salt), used to unwrap the master key
async function deriveKey(username, password, salt, usages){
  const km = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(username.toLowerCase() + '\n' + password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: KDF_ITERATIONS, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, usages);
}

async function decrypt(username, password){
  const entry = USERS.find(u => u.u.toLowerCase() === username.toLowerCase().trim());
  if (!entry) throw new Error('bad');
  // 1) unwrap the master key with the user's credentials
  const wrapKey = await deriveKey(username, password, b64ToBytes(entry.s), ['decrypt']);
  const masterRaw = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: b64ToBytes(entry.iv) }, wrapKey, b64ToBytes(entry.w));
  // 2) decrypt the data with the master key
  const master = await crypto.subtle.importKey('raw', masterRaw, 'AES-GCM', false, ['decrypt']);
  const raw = b64ToBytes(ENC_DATA);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: raw.slice(0, 12) }, master, raw.slice(12));
  return JSON.parse(new TextDecoder().decode(pt));
}

// fire-and-forget login event to the Google Sheet (Apps Script), if configured
function logLogin(username){
  if (!LOG_ENDPOINT) return;
  try {
    fetch(LOG_ENDPOINT, { method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ user: username, ua: navigator.userAgent }) });
  } catch (e) {}
}
// read the login counter via JSONP (Apps Script) and show it
function loadCount(){
  if (!LOG_ENDPOINT) return;
  const cb = 'c' + Date.now();
  window[cb] = res => {
    const el = $('userCount');
    if (el && res) el.textContent = '👤 ' + (res.users != null ? res.users : res.count) + ' משתמשים · ' + (res.logins != null ? res.logins : res.count) + ' כניסות';
    delete window[cb];
  };
  const s = document.createElement('script');
  s.src = LOG_ENDPOINT + (LOG_ENDPOINT.includes('?') ? '&' : '?') + 'action=count&callback=' + cb;
  s.onerror = () => { delete window[cb]; };
  document.body.appendChild(s);
}

async function unlock(){
  const usr = $('usr').value.trim();
  const pw = $('pw').value;
  if (!usr || !pw) return;
  if (!(window.crypto && crypto.subtle)) {
    $('lockErr').textContent = 'הדפדפן חוסם פענוח בהקשר זה — יש לפתוח את הקובץ ישירות בדפדפן (Chrome/Safari) או מכתובת https';
    return;
  }
  $('unlockBtn').disabled = true;
  $('lockErr').textContent = '';
  $('unlockBtn').textContent = 'מפענח…';
  try {
    DATA = await decrypt(usr, pw);
    logLogin(usr);
    initApp();
    loadCount();
  } catch (e) {
    $('lockErr').textContent = 'שם משתמש או סיסמה שגויים, נסו שוב';
  } finally {
    $('unlockBtn').disabled = false;
    $('unlockBtn').textContent = 'כניסה';
  }
}
$('unlockBtn').addEventListener('click', unlock);
$('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
$('usr').addEventListener('keydown', e => { if (e.key === 'Enter') $('pw').focus(); });

function initApp(){
  $('lock').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('genDate').textContent = 'עודכן ' + DATA.generated.split('-').reverse().join('.');
  state.month = DATA.months[DATA.months.length - 1].key;
  renderMonths();
  renderAssumpSummary();
  $('destSearch').focus();
}

function renderMonths(){
  const el = $('months');
  el.innerHTML = '';
  for (const m of DATA.months) {
    const b = document.createElement('button');
    b.className = 'month-chip' + (m.key === state.month ? ' sel' : '');
    b.textContent = m.label;
    b.onclick = () => { state.month = m.key; renderMonths(); render(); };
    el.appendChild(b);
  }
}

function destsForMonth(){

    if (r.m !== state.month) continue;

    if (!e) { e = { cnt: 0, iatas: new Set() }; map.set(r.dest, e); }
    e.cnt++;
    if (r.iata) e.iatas.add(r.iata);
  }
  return [...map.entries()]
    .map(([dest, e]) => [dest, e.cnt, [...e.iatas].join(' ')])
    .sort((a, b) => a[0].localeCompare(b[0]));
}

function showSuggest(){
  const q = $('destSearch').value.trim().toLowerCase();
  // match either the city name or any IATA code of that destination
  const list = destsForMonth().filter(([d, , iata]) =>
    !q || d.toLowerCase().includes(q) || iata.toLowerCase().includes(q));
  const el = $('suggest');
  el.innerHTML = '';
  if (!list.length) { el.classList.add('hidden'); return; }
  for (const [dest, cnt, iata] of list.slice(0, 60)) {
    const b = document.createElement('button');
    const code = iata ? ` <span style="color:var(--muted)">· ${iata}</span>` : '';
    b.innerHTML = `<span>${dest}${code}</span><span class="cnt">${cnt} מטוסים</span>`;
    b.onclick = () => { state.dest = dest; state.ac = 'all'; $('destSearch').value = dest; hideSuggest(); setFeeFromDest(dest); render(); };
    el.appendChild(b);
  }
  el.classList.remove('hidden');
}
function hideSuggest(){ $('suggest').classList.add('hidden'); }

$('destSearch').addEventListener('input', showSuggest);
$('destSearch').addEventListener('focus', showSuggest);
document.addEventListener('click', e => {
  if (!e.target.closest('.searchwrap')) hideSuggest();
});

/* סינון המראה */
$('depSeg').addEventListener('click', e => {
  const b = e.target.closest('button');
  if (!b) return;
  state.dep = b.dataset.v;
  for (const x of $('depSeg').children) x.classList.toggle('sel', x === b);
  state.ac = 'all';   // changing departures resets the aircraft filter
  render();
});

/* סינון מטוס */
$('acFilter').addEventListener('change', () => { state.ac = $('acFilter').value; render(); });

/* הנחות חישוב */
$('taxSeg').addEventListener('click', e => {
  const b = e.target.closest('button');
  if (!b) return;
  state.tax = b.dataset.v;
  for (const x of $('taxSeg').children) x.classList.toggle('sel', x === b);
  renderAssumpSummary(); render();
});
$('occ').addEventListener('input', () => {
  state.occ = Math.min(100, Math.max(1, +$('occ').value || 100));
  renderAssumpSummary(); render();
});
$('fee').addEventListener('input', () => {
  state.fee = Math.min(30, Math.max(0, +$('fee').value || 0));
  state.feeManual = true;   // user overrode the default from the pricing system
  renderAssumpSummary(); render();
});
// default the distribution commission to the destination's value from the pricing
// system (short 4.5% / long 5.5%); the user can still override it manually.
function setFeeFromDest(dest){
  if (state.feeManual) return;
  const rec = DATA.records.find(r => r.m === state.month && r.dest === dest);
  if (rec && rec.comm != null) {
    state.fee = rec.comm;
    $('fee').value = rec.comm;
    renderAssumpSummary();   // keep the header summary in sync with the auto-filled fee
  }
}
function renderAssumpSummary(){
  $('assumpSummary').textContent =
    (state.tax === 'incl' ? 'כולל מיסי נמל' : 'ללא מיסי נמל') +
    ' · תפוסה ' + state.occ + '% · עמלה ' + state.fee + '%';
}

function hhmm(h){
  if (!h) return '—';
  const m = Math.round(h * 60);
  return Math.floor(m / 60) + ':' + String(m % 60).padStart(2, '0');
}

function render(){
  const res = $('results');
  res.innerHTML = '';
  if (!state.dest) {
    $('depBar').classList.add('hidden');
    $('status').textContent = 'בחרו חודש והקלידו יעד כדי להציג את הנתונים';
    return;
  }
  $('depBar').classList.remove('hidden');

  let all = DATA.records.filter(r => r.m === state.month && r.dest === state.dest);
  if (state.dep === 'tlv') all = all.filter(r => r.dep === 'TLV');
  // populate the aircraft filter from the aircraft available for this destination
  const acList = [...new Set(all.map(r => r.ac))].sort((a, b) => a.localeCompare(b));
  if (!acList.includes(state.ac)) state.ac = 'all';
  const sel = $('acFilter');
  sel.innerHTML = '<option value="all">כל המטוסים (' + all.length + ')</option>' +
    acList.map(a => `<option value="${a}"${a === state.ac ? ' selected' : ''}>${a}</option>`).join('');
  sel.value = state.ac;

  const rows = state.ac === 'all' ? all.slice() : all.filter(r => r.ac === state.ac);
  const monthLabel = (DATA.months.find(m => m.key === state.month) || {}).label || '';
  if (!rows.length) {
    $('status').textContent = 'אין נתונים ליעד ' + state.dest + ' עם הסינון הנוכחי';
    return;
  }
  $('status').textContent = state.dest + ' · ' + monthLabel + ' · ' + rows.length +
    (state.dep === 'tlv' ? ' מטוסים מתל אביב' : ' מטוסים') +
    (state.ac !== 'all' ? ' · ' + state.ac : '') + ' (ממוין לפי מחיר למושב)';

  const calc = r => {
    // distribution commission is a share of the selling price → gross up: price = cost / (1 - fee)
    const gross = base => base / (1 - state.fee / 100);
    const tot = gross(state.tax === 'incl' ? r.totIncl : r.totEx);
    const varc = gross(state.tax === 'incl' ? r.varIncl : r.varEx);
    const fixed = gross(r.fixed);
    const paxSeats = r.seats * state.occ / 100;
    return { tot, varc, fixed, perSeat: tot / paxSeats, varPerSeat: varc / paxSeats, fixPerSeat: fixed / paxSeats };
  };
  rows.sort((a, b) => calc(a).perSeat - calc(b).perSeat);

  for (const r of rows) {
    const c = calc(r);
    const fuelPct = r.totIncl ? Math.round(100 * r.brk.fuel / r.totIncl) : 0;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="head">
        <div>
          <div class="ac">${r.ac}</div>
          <div class="sub">${r.acType} · ${r.pilots} טייסים · ${r.att} דיילים${r.dep && r.dep !== 'TLV' ? ' · המראה: ' + r.dep : ''}</div>
        </div>
        <span class="route">${r.route}</span>
      </div>
      <div class="bignums">
        <div class="bignum green">
          <div class="lbl">מחיר למושב (${state.tax === 'incl' ? 'כולל' : 'ללא'} מיסי נמל)</div>
          <div class="val">${fmt.format(c.perSeat)}</div>
        </div>
        <div class="bignum">
          <div class="lbl">עלות טיסה כוללת</div>
          <div class="val">${fmt.format(c.tot)}</div>
        </div>
      </div>
      <div class="minis">
        <span>מושבים <b>${r.seats}</b></span>
        <span>זמן טיסה <b>${hhmm(r.ftOut)} / ${hhmm(r.ftBack)}</b></span>
        <span>משתנה למושב <b>${fmt.format(c.varPerSeat)}</b></span>
        <span>קבועה למושב <b>${fmt.format(c.fixPerSeat)}</b></span>
        <span>דלק <b>${fuelPct}%</b> מהעלות</span>
      </div>
      <details class="brk">
        <summary>פירוט עלויות לטיסה</summary>
        <table>
          <tr><td>שכר וכ"א</td><td class="v">${fmt.format(r.brk.crew)}</td></tr>
          <tr><td>הוצאות בארץ</td><td class="v">${fmt.format(r.brk.israel)}</td></tr>
          <tr><td>דלק (כולל מס פחמן)</td><td class="v">${fmt.format(r.brk.fuel)}</td></tr>
          <tr><td>ביטוח</td><td class="v">${fmt.format(r.brk.ins)}</td></tr>
          <tr><td>דמי חכירה</td><td class="v">${fmt.format(r.brk.lease)}</td></tr>
          <tr><td>אחזקה</td><td class="v">${fmt.format(r.brk.maint)}</td></tr>
          <tr><td>הוצאות בחו"ל</td><td class="v">${fmt.format(r.brk.abroad)}</td></tr>
          <tr><td>עלויות נוסע (כולל מיסי נמל)</td><td class="v">${fmt.format(r.brk.pax)}</td></tr>
          <tr><td class="sub">— מזה מיסי נמל בארץ / בחו"ל</td><td class="v">${fmt.format(r.brk.taxIl)} / ${fmt.format(r.brk.taxAb)}</td></tr>
          <tr><td>סה"כ הוצאות קבועות</td><td class="v">${fmt.format(r.fixed)}</td></tr>
          <tr class="total"><td>סה"כ עלות טיסה (${state.tax === 'incl' ? 'כולל' : 'ללא'} מיסי נמל${state.fee ? ', כולל עמלה' : ''})</td><td class="v">${fmt.format(c.tot)}</td></tr>
          <tr><td>זמן טיסה BT הלוך/חזור</td><td class="v">${hhmm(r.btOut)} / ${hhmm(r.btBack)}</td></tr>
        </table>
      </details>`;
    res.appendChild(card);
  }
}
</script>
</body>
</html>
