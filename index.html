<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>תמחיר טיסות</title>
<style>
  :root{
    /* ערכת מותג ארקיע */
    --bg:#f2f5f9; --card:#ffffff; --ink:#0e1c2e; --muted:#5b6b7f;
    --brand:#123a86; --brand2:#1e63b8; --accent:#0e7a4e; --line:#e2e8f0;
    --danger:#b3261e; --chip:#e8eff7;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,"Heebo",Arial,sans-serif;
    font-size:16px; line-height:1.45;
  }
  .hidden{display:none !important}

  /* ── מסך נעילה ── */
  #lock{
    min-height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px;
    background:linear-gradient(160deg,var(--brand) 0%,var(--brand2) 100%);
  }
  #lock .panel{
    width:100%; max-width:360px; background:var(--card); border-radius:16px;
    padding:28px 22px; box-shadow:0 10px 30px rgba(0,0,0,.25); text-align:center;
  }
  #lock .logo{width:170px; max-width:70%; height:auto; margin:2px auto 6px; display:block}
  #lock h1{margin:6px 0 2px; font-size:18px; color:var(--brand); font-weight:600}
  #lock p{margin:0 0 18px; color:var(--muted); font-size:14px}
  #pw{
    width:100%; padding:12px 14px; font-size:17px; border:1px solid var(--line);
    border-radius:10px; text-align:center; direction:ltr;
  }
  #pw:focus{outline:2px solid var(--brand2); border-color:transparent}
  #unlockBtn{
    width:100%; margin-top:12px; padding:13px; font-size:17px; font-weight:600;
    color:#fff; background:var(--brand); border:0; border-radius:10px; cursor:pointer;
  }
  #unlockBtn:disabled{opacity:.6}
  #lockErr{color:var(--danger); font-size:14px; min-height:20px; margin-top:10px}

  /* ── מסך ראשי ── */
  header.app{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(160deg,var(--brand) 0%,var(--brand2) 100%);
    color:#fff; padding:12px 14px 10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  header.app .title{display:flex; align-items:center; gap:9px}
  header.app .logobadge{
    background:#fff; border-radius:8px; padding:4px 8px; line-height:0;
    box-shadow:0 1px 4px rgba(0,0,0,.15); flex:0 0 auto;
  }
  header.app .logobadge img{height:22px; width:auto; display:block}
  header.app h1{margin:0; font-size:17px}
  header.app .gen{font-size:11px; opacity:.75}
  header.app .syslink{
    margin-inline-start:auto; flex:0 0 auto; color:#fff; text-decoration:none;
    background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.42);
    font-size:12.5px; font-weight:600; padding:5px 9px; border-radius:8px; white-space:nowrap;
  }
  header.app .syslink:active{background:#fff; color:var(--brand)}
  .monthsrow{display:flex; align-items:center; gap:8px}
  .topctrl{display:flex; align-items:center; gap:6px; flex:0 0 auto}
  .seg-hdr{border:1px solid rgba(255,255,255,.4); border-radius:8px; overflow:hidden; display:inline-flex}
  .seg-hdr button{background:rgba(255,255,255,.16); color:#fff; border:0; padding:6px 10px; font-size:15px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center}
  .seg-hdr button svg{display:block}
  .seg-hdr button.sel{background:#fff; color:var(--brand); font-weight:700}
  .acfilter-hdr{background:#fff; color:var(--ink); border:0; border-radius:8px; padding:6px 8px; font-size:12.5px; max-width:150px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  /* בורר צי רב-ברירתי */
  .acmulti{position:relative}
  .acmenu{position:absolute; top:calc(100% + 5px); left:0; z-index:40; background:#fff; color:var(--ink);
    border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.22); min-width:200px; max-height:52dvh; overflow-y:auto; padding:4px}
  .acmenu .acopt{display:flex; align-items:center; gap:9px; padding:9px 11px; font-size:14px; cursor:pointer; border-radius:7px; white-space:nowrap}
  .acmenu .acopt:hover{background:var(--chip)}
  .acmenu .acopt input{width:17px; height:17px; accent-color:var(--brand); flex:0 0 auto}
  .acmenu .acall{border-bottom:1px solid var(--line); font-weight:700; color:var(--brand); border-radius:7px 7px 0 0}
  .months{flex:1; min-width:0; display:flex; gap:8px; overflow-x:auto; padding:10px 0 2px}
  .month-chip{
    flex:0 0 auto; padding:6px 14px; border-radius:999px; font-size:14px;
    background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.35); cursor:pointer;
  }
  .month-chip.sel{background:#fff; color:var(--brand); font-weight:700; border-color:#fff}
  .searchwrap{position:relative; margin-top:8px}
  #destSearch{
    width:100%; padding:11px 40px 11px 14px; font-size:16px; border:0;
    border-radius:10px;
  }
  .searchwrap .icon{position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--muted)}
  #suggest{
    position:absolute; top:calc(100% + 4px); right:0; left:0; z-index:30;
    background:var(--card); color:var(--ink); border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.2); max-height:45dvh; overflow-y:auto;
  }
  #suggest button{
    display:flex; justify-content:space-between; width:100%; padding:11px 14px;
    background:none; border:0; border-bottom:1px solid var(--line);
    font-size:15px; text-align:right; cursor:pointer;
  }
  #suggest button:last-child{border-bottom:0}
  #suggest .cnt{color:var(--muted); font-size:13px}

  main{padding:12px 12px 40px; max-width:640px; margin:0 auto}

  /* הנחות חישוב */
  #assump{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:10px 12px; margin-bottom:12px; font-size:14px;
  }
  #assump summary{cursor:pointer; font-weight:600; color:var(--brand)}
  #assump .row{display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap}
  #assump label{color:var(--muted)}
  #assump input[type=number]{
    width:76px; padding:6px 8px; font-size:15px; border:1px solid var(--line); border-radius:8px;
  }
  .depbar{margin-bottom:12px; display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap}
  .depbar .seg{background:var(--card)}
  .acfilter{
    background:var(--card); border:1px solid var(--line); border-radius:8px;
    padding:7px 10px; font-size:14px; color:var(--fg, inherit); max-width:60%;
  }
  /* תצוגת רשימה */
  .listwrap{overflow-x:auto; background:var(--card); border:1px solid var(--line); border-radius:12px}
  .listtbl{width:100%; border-collapse:collapse; font-size:14px}
  .listtbl th{background:var(--brand); color:#fff; padding:8px 6px; font-weight:600; text-align:center; font-size:12.5px}
  .listtbl th .th-sub{font-weight:400; opacity:.85; font-size:10.5px}
  .listtbl td{padding:8px 6px; border-bottom:1px solid var(--line); text-align:center; white-space:nowrap}
  .listtbl tr:last-child td{border-bottom:0}
  .listtbl tr:nth-child(even) td{background:#f7f9fc}
  .listtbl td.ac{text-align:right; white-space:normal}
  .listtbl td.ac b{display:block}
  .listtbl td.ac .t{color:var(--muted); font-size:12px}
  .listtbl td.code{font-weight:600; color:var(--brand); direction:ltr}
  .listtbl td.price{font-weight:700; color:var(--accent)}
  .listtbl tr.lrow{cursor:pointer}
  .listtbl tr.lrow.open td{background:#eaf0f8}
  .listtbl td.exp{width:26px; color:var(--brand2); font-weight:700}
  .listtbl tr.ldetail td{padding:0; background:#f7f9fc; text-align:right}
  .ldbox{padding:10px 12px}
  .ldbox .minis{margin-bottom:8px}
  .brk-list{border-top:0 !important; padding-top:0 !important}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden}
  .seg button{padding:6px 12px; border:0; background:var(--card); font-size:14px; cursor:pointer}
  .seg button.sel{background:var(--brand); color:#fff; font-weight:600}

  /* תצוגת רשימה מורחבת — טבלה (עמודה לכל מטוס) */
  .xwrap{overflow-x:auto; -webkit-overflow-scrolling:touch; background:var(--card); border:1px solid var(--line); border-radius:12px}
  .xtable{border-collapse:separate; border-spacing:0; font-size:13px; min-width:100%}
  .xtable th, .xtable td{padding:8px 11px; border-bottom:1px solid var(--line); white-space:nowrap; text-align:center; direction:ltr; font-variant-numeric:tabular-nums}
  .xtable thead th{position:sticky; top:0; z-index:3; background:var(--brand); color:#fff; font-weight:700; text-align:center}
  .xtable thead th .th-sub{display:block; font-weight:400; font-size:11px; opacity:.85}
  .xtable td.lbl, .xtable th.lbl{position:sticky; right:0; z-index:2; text-align:right; direction:rtl; background:var(--card); font-weight:600; box-shadow:-1px 0 0 var(--line)}
  .xtable thead th.lbl{z-index:4; background:var(--brand)}
  .xtable tbody tr:nth-child(even) td{background:#f7f9fc}
  .xtable tbody tr:nth-child(even) td.lbl{background:#eef3f9}
  .xtable tr.grp td{background:var(--chip); color:var(--brand); font-weight:700; text-align:right; direction:rtl}
  .xtable tr.sum td{font-weight:800; color:var(--brand)}
  .xtable tr.sum2 td{font-weight:700; color:var(--accent)}
  .xtable tr.acmi td{background:#eaf2ff !important; font-weight:800; color:var(--brand2)}
  .xnote{font-size:12px; color:var(--muted); margin:8px 4px 0; text-align:right}

  #status{color:var(--muted); text-align:center; margin:26px 8px; font-size:15px}

  /* כרטיס מטוס */
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px; margin-bottom:12px; box-shadow:0 1px 3px rgba(14,28,46,.06);
  }
  .card .head{display:flex; justify-content:space-between; align-items:flex-start; gap:8px}
  .card .ac{font-weight:700; font-size:17px}
  .card .route{
    font-size:13px; color:var(--brand); background:var(--chip);
    border-radius:6px; padding:2px 8px; direction:ltr; white-space:nowrap;
  }
  .card .sub{color:var(--muted); font-size:13px; margin-top:2px}
  .bignums{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0 8px}
  .bignum{background:var(--bg); border-radius:10px; padding:10px 12px}
  .bignum .lbl{font-size:12px; color:var(--muted)}
  .bignum .val{font-size:21px; font-weight:800; color:var(--brand); direction:ltr; text-align:right}
  .bignum.green .val{color:var(--accent)}
  .minis{display:flex; flex-wrap:wrap; gap:6px 14px; font-size:13px; color:var(--muted)}
  .minis b{color:var(--ink); font-weight:600}
  details.brk{margin-top:10px; border-top:1px dashed var(--line); padding-top:8px}
  details.brk summary{cursor:pointer; font-size:14px; color:var(--brand2); font-weight:600}
  .brk table{width:100%; border-collapse:collapse; margin-top:8px; font-size:14px}
  .brk td{padding:5px 2px; border-bottom:1px solid var(--line)}
  .brk td.v{text-align:left; direction:ltr; font-variant-numeric:tabular-nums}
  .brk tr.total td{font-weight:700; border-bottom:0}
  .brk tr.acmi td{font-weight:700; color:var(--brand2); background:#eaf2ff}
  .brk tr.acmi td .sub{color:var(--muted); font-weight:400; font-size:11.5px}
  .note{font-size:12px; color:var(--muted); text-align:center; margin-top:18px}
</style>
</head>

function b64ToBytes(b64){
  const bin = atob(b64), arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

// derive a key from username+password (per-user salt), used to unwrap the master key
async function deriveKey(username, password, salt, usages){
  const km = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(username.toLowerCase() + '\n' + password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: KDF_ITERATIONS, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, usages);
}

  if (!entry) throw new Error('bad');
  // 1) unwrap the master key with the user's credentials
  const wrapKey = await deriveKey(username, password, b64ToBytes(entry.s), ['decrypt']);
  const masterRaw = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: b64ToBytes(entry.iv) }, wrapKey, b64ToBytes(entry.w));

  const s = document.createElement('script');
  s.src = LOG_ENDPOINT + (LOG_ENDPOINT.includes('?') ? '&' : '?') + 'action=count&callback=' + cb;
  s.onerror = () => { delete window[cb]; };
  document.body.appendChild(s);
}

async function unlock(){
  const usr = $('usr').value.trim();
  const pw = $('pw').value;
  if (!usr || !pw) return;
  if (!(window.crypto && crypto.subtle)) {
    $('lockErr').textContent = 'הדפדפן חוסם פענוח בהקשר זה — יש לפתוח את הקובץ ישירות בדפדפן (Chrome/Safari) או מכתובת https';
    return;
  }
  $('unlockBtn').disabled = true;
  $('lockErr').textContent = '';
  $('unlockBtn').textContent = 'מפענח…';
  try {
    DATA = await decrypt(usr, pw);
    logLogin(usr);
    initApp();
    loadCount();
  } catch (e) {
    $('lockErr').textContent = 'שם משתמש או סיסמה שגויים, נסו שוב';
  } finally {
    $('unlockBtn').disabled = false;
    $('unlockBtn').textContent = 'כניסה';
  }
}
$('unlockBtn').addEventListener('click', unlock);
$('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
$('usr').addEventListener('keydown', e => { if (e.key === 'Enter') $('pw').focus(); });

/* ── אפליקציה ── */
function initApp(){
  $('lock').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('genDate').textContent = 'עודכן ' + DATA.generated.split('-').reverse().join('.');
  state.month = DATA.months[DATA.months.length - 1].key;
  renderMonths();
  renderAssumpSummary();
  $('destSearch').focus();
  resetIdle();   // start the inactivity timer
}

function renderMonths(){
  const el = $('months');
  el.innerHTML = '';
  for (const m of DATA.months) {
    const b = document.createElement('button');
    b.className = 'month-chip' + (m.key === state.month ? ' sel' : '');
    b.textContent = m.label;
    b.onclick = () => { state.month = m.key; renderMonths(); render(); };
    el.appendChild(b);
  }
}

function destsForMonth(){
  // group this month's flights by destination, collecting the IATA codes seen for it
  const map = new Map();
  for (const r of DATA.records) {
    if (r.m !== state.month) continue;
    let e = map.get(r.dest);
    if (!e) { e = { cnt: 0, iatas: new Set() }; map.set(r.dest, e); }
    e.cnt++;
    if (r.iata) e.iatas.add(r.iata);
  }
  return [...map.entries()]
    .map(([dest, e]) => [dest, e.cnt, [...e.iatas].join(' ')])
    .sort((a, b) => a[0].localeCompare(b[0]));
}

function showSuggest(){
  const q = $('destSearch').value.trim().toLowerCase();
  // match either the city name or any IATA code of that destination
  const list = destsForMonth().filter(([d, , iata]) =>
    !q || d.toLowerCase().includes(q) || iata.toLowerCase().includes(q));
  const el = $('suggest');
  el.innerHTML = '';
  if (!list.length) { el.classList.add('hidden'); return; }
  for (const [dest, cnt, iata] of list.slice(0, 60)) {
    const b = document.createElement('button');
    const code = iata ? ` <span style="color:var(--muted)">· ${iata}</span>` : '';
    b.innerHTML = `<span>${dest}${code}</span><span class="cnt">${cnt} מטוסים</span>`;
    b.onclick = () => { state.dest = dest; state.acSel = []; $('destSearch').value = dest; hideSuggest(); setFeeFromDest(dest); render(); };
    el.appendChild(b);
  }
  el.classList.remove('hidden');
}
function hideSuggest(){ $('suggest').classList.add('hidden'); }

$('destSearch').addEventListener('input', showSuggest);
$('destSearch').addEventListener('focus', showSuggest);
document.addEventListener('click', e => {
  if (!e.target.closest('.searchwrap')) hideSuggest();
});

/* סינון המראה */
$('depSeg').addEventListener('click', e => {
  const b = e.target.closest('button');
  if (!b) return;
  state.dep = b.dataset.v;
  for (const x of $('depSeg').children) x.classList.toggle('sel', x === b);
  state.acSel = [];   // changing departures resets the aircraft filter
  render();
});

/* סינון מטוס — רב-ברירה (צ'ק-בוקסים) */
function acLabel(){
  if (!state.acSel.length) return 'כל המטוסים';
  if (state.acSel.length === 1) return state.acSel[0];
  return state.acSel.length + ' ציים נבחרו';
}
function renderAcFilter(acList, total){
  $('acBtn').textContent = acLabel() + ' ▾';
  $('acMenu').innerHTML =
    `<label class="acopt acall"><input type="checkbox" id="acAll" ${state.acSel.length ? '' : 'checked'}> כל המטוסים (${total})</label>` +
    acList.map(a => `<label class="acopt"><input type="checkbox" value="${a}" ${state.acSel.includes(a) ? 'checked' : ''}> ${a}</label>`).join('');
}
$('acBtn').addEventListener('click', e => { e.stopPropagation(); $('acMenu').classList.toggle('hidden'); });
$('acMenu').addEventListener('click', e => e.stopPropagation());
$('acMenu').addEventListener('change', e => {
  const t = e.target;
  if (t.id === 'acAll') { state.acSel = []; }
  else if (t.value) {
    if (t.checked) { if (!state.acSel.includes(t.value)) state.acSel.push(t.value); }
    else { state.acSel = state.acSel.filter(x => x !== t.value); }
  }
  render();
});
document.addEventListener('click', () => $('acMenu').classList.add('hidden'));

/* תצוגה: קוביות / רשימה */
$('viewSeg').addEventListener('click', e => {
  const b = e.target.closest('button');
  if (!b) return;
  state.view = b.dataset.v;
  for (const x of $('viewSeg').children) x.classList.toggle('sel', x === b);
  render();
});

/* הנחות חישוב */
$('taxSeg').addEventListener('click', e => {
  const b = e.target.closest('button');
  if (!b) return;
  state.tax = b.dataset.v;
  for (const x of $('taxSeg').children) x.classList.toggle('sel', x === b);
  renderAssumpSummary(); render();
});
$('occ').addEventListener('input', () => {
  state.occ = Math.min(100, Math.max(1, +$('occ').value || 100));
  renderAssumpSummary(); render();
});
$('fee').addEventListener('input', () => {
  state.fee = Math.min(30, Math.max(0, +$('fee').value || 0));
  state.feeManual = true;   // user overrode the default from the pricing system
  renderAssumpSummary(); render();
});
// default the distribution commission to the destination's value from the pricing
// system (short 4.5% / long 5.5%); the user can still override it manually.
function setFeeFromDest(dest){
  if (state.feeManual) return;
  const rec = DATA.records.find(r => r.m === state.month && r.dest === dest);
  if (rec && rec.comm != null) {
    state.fee = rec.comm;
    $('fee').value = rec.comm;
    renderAssumpSummary();   // keep the header summary in sync with the auto-filled fee
  }
}
function renderAssumpSummary(){
  $('assumpSummary').textContent =
    (state.tax === 'incl' ? 'כולל מיסי נמל' : 'ללא מיסי נמל') +
    ' · תפוסה ' + state.occ + '% · עמלה ' + state.fee + '%';
}

function hhmm(h){
  if (!h) return '—';
  const m = Math.round(h * 60);
  return Math.floor(m / 60) + ':' + String(m % 60).padStart(2, '0');
}

function render(){
  const res = $('results');
  res.innerHTML = '';
  if (!state.dest) {
    $('depBar').classList.add('hidden');
    $('topCtrl').classList.add('hidden');
    $('status').textContent = 'בחרו חודש והקלידו יעד כדי להציג את הנתונים';
    return;
  }
  $('depBar').classList.remove('hidden');
  $('topCtrl').classList.remove('hidden');

  let all = DATA.records.filter(r => r.m === state.month && r.dest === state.dest);
  if (state.dep === 'tlv') all = all.filter(r => r.dep === 'TLV');
  // populate the aircraft filter from the aircraft available for this destination
  const acList = [...new Set(all.map(r => r.ac))].sort((a, b) => a.localeCompare(b));
  // drop selections that aren't available for this destination
  state.acSel = state.acSel.filter(a => acList.includes(a));
  renderAcFilter(acList, all.length);

  const rows = state.acSel.length ? all.filter(r => state.acSel.includes(r.ac)) : all.slice();
  const monthLabel = (DATA.months.find(m => m.key === state.month) || {}).label || '';
  if (!rows.length) {
    $('status').textContent = 'אין נתונים ליעד ' + state.dest + ' עם הסינון הנוכחי';
    return;
  }
  const acLbl = state.acSel.length === 1 ? ' · ' + state.acSel[0]
              : state.acSel.length ? ' · ' + state.acSel.length + ' ציים' : '';
  $('status').textContent = state.dest + ' · ' + monthLabel + ' · ' + rows.length +
    (state.dep === 'tlv' ? ' מטוסים מתל אביב' : ' מטוסים') + acLbl + ' (ממוין לפי מחיר למושב)';

  const calc = r => {
    // distribution commission is a share of the selling price → gross up: price = cost / (1 - fee)
    const gross = base => base / (1 - state.fee / 100);
    const tot = gross(state.tax === 'incl' ? r.totIncl : r.totEx);
    const varc = gross(state.tax === 'incl' ? r.varIncl : r.varEx);
    const fixed = gross(r.fixed);
    const paxSeats = r.seats * state.occ / 100;
    return { tot, varc, fixed, perSeat: tot / paxSeats, varPerSeat: varc / paxSeats, fixPerSeat: fixed / paxSeats };
  };
  rows.sort((a, b) => calc(a).perSeat - calc(b).perSeat);

  if (state.view === 'list') { renderList(res, rows, calc); return; }
  if (state.view === 'xlist') { renderExpanded(res, rows, calc); return; }

  for (const r of rows) {
    const c = calc(r);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="head">
        <div>
          <div class="ac">${r.ac}</div>
          <div class="sub">${r.acType} · ${r.pilots} טייסים · ${r.att} דיילים${r.dep && r.dep !== 'TLV' ? ' · המראה: ' + r.dep : ''}</div>
        </div>
        <span class="route">${r.route}</span>
      </div>
      <div class="bignums">
        <div class="bignum green">
          <div class="lbl">מחיר למושב (${state.tax === 'incl' ? 'כולל' : 'ללא'} מיסי נמל)</div>
          <div class="val">${fmt.format(c.perSeat)}</div>
        </div>
        <div class="bignum">
          <div class="lbl">עלות טיסה כוללת</div>
          <div class="val">${fmt.format(c.tot)}</div>
        </div>
      </div>
      ${minisHtml(r, c)}
      <details class="brk">
        <summary>פירוט עלויות לטיסה</summary>
        ${breakdownHtml(r, c)}
      </details>`;
    res.appendChild(card);
  }
}

/* מדדים קצרים + פירוט עלויות — משותפים לתצוגת קוביות ורשימה */
function minisHtml(r, c){
  const fuelPct = r.totIncl ? Math.round(100 * r.brk.fuel / r.totIncl) : 0;
  return `<div class="minis">
    <span>מושבים <b>${r.seats}</b></span>
    <span>זמן טיסה FT <b>${hhmm(r.ftOut)} / ${hhmm(r.ftBack)}</b></span>
    <span>טייסים/דיילים <b>${r.pilots} / ${r.att}</b></span>
    ${r.dep ? `<span>המראה <b>${r.dep}</b></span>` : ''}
    <span>משתנה למושב <b>${fmt.format(c.varPerSeat)}</b></span>
    <span>קבועה למושב <b>${fmt.format(c.fixPerSeat)}</b></span>
    <span>דלק <b>${fuelPct}%</b> מהעלות</span>
  </div>`;
}
function breakdownHtml(r, c){
  return `<table>
    <tr><td>שכר וכ"א</td><td class="v">${fmt.format(r.brk.crew)}</td></tr>
    <tr><td>הוצאות בארץ</td><td class="v">${fmt.format(r.brk.israel)}</td></tr>
    <tr><td>דלק (כולל מס פחמן)</td><td class="v">${fmt.format(r.brk.fuel)}</td></tr>
    <tr><td>ביטוח</td><td class="v">${fmt.format(r.brk.ins)}</td></tr>
    <tr><td>דמי חכירה</td><td class="v">${fmt.format(r.brk.lease)}</td></tr>
    <tr><td>אחזקה</td><td class="v">${fmt.format(r.brk.maint)}</td></tr>
    <tr><td>הוצאות בחו"ל</td><td class="v">${fmt.format(r.brk.abroad)}</td></tr>
    <tr><td>עלויות נוסע (כולל מיסי נמל)</td><td class="v">${fmt.format(r.brk.pax)}</td></tr>
    <tr><td class="sub">— מזה מיסי נמל בארץ / בחו"ל</td><td class="v">${fmt.format(r.brk.taxIl)} / ${fmt.format(r.brk.taxAb)}</td></tr>
    <tr><td>סה"כ הוצאות קבועות</td><td class="v">${fmt.format(r.fixed)}</td></tr>
    <tr class="acmi"><td>ACMI <span class="sub">(קבועות+כ"א+אחזקה+ביטוח+חכירה)</span></td><td class="v">${fmt.format(r.fixed + r.brk.crew + r.brk.maint + r.brk.ins + r.brk.lease)}</td></tr>
    <tr class="total"><td>סה"כ עלות טיסה (${state.tax === 'incl' ? 'כולל' : 'ללא'} מיסי נמל${state.fee ? ', כולל עמלה' : ''})</td><td class="v">${fmt.format(c.tot)}</td></tr>
    <tr><td>זמן טיסה BT הלוך/חזור</td><td class="v">${hhmm(r.btOut)} / ${hhmm(r.btBack)}</td></tr>
  </table>`;
}

/* תצוגת רשימה (טבלה) — כל שורה ניתנת להרחבה לפירוט מלא */
function renderList(res, rows, calc){
  const taxLbl = state.tax === 'incl' ? 'כולל מיסים' : 'ללא מיסים';
  let html = '<div class="listwrap"><table class="listtbl"><thead><tr>' +
    '<th>מטוס</th><th>קו</th><th>מושבים</th><th>מחיר/מושב<br><span class="th-sub">(' + taxLbl + ')</span></th><th>עלות טיסה</th><th></th>' +
    '</tr></thead><tbody>';
  rows.forEach((r, i) => {
    const c = calc(r);
    html += `<tr class="lrow" data-i="${i}">
      <td class="ac"><b>${r.ac}</b><span class="t">${r.acType}${r.dep && r.dep !== 'TLV' ? ' · ' + r.dep : ''}</span></td>
      <td class="code">${r.route}</td>
      <td>${r.seats}</td>
      <td class="price">${fmt.format(c.perSeat)}</td>
      <td>${fmt.format(c.tot)}</td>
      <td class="exp">▾</td>
    </tr>
    <tr class="ldetail hidden" data-d="${i}"><td colspan="6"><div class="ldbox">${minisHtml(r, c)}<div class="brk brk-list">${breakdownHtml(r, c)}</div></div></td></tr>`;
  });
  html += '</tbody></table></div>';
  res.innerHTML = html;
  res.querySelectorAll('.lrow').forEach(tr => tr.addEventListener('click', () => {
    const d = res.querySelector('.ldetail[data-d="' + tr.dataset.i + '"]');
    const nowHidden = d.classList.toggle('hidden');
    tr.querySelector('.exp').textContent = nowHidden ? '▾' : '▴';
    tr.classList.toggle('open', !nowHidden);
  }));
}

/* תצוגת רשימה מורחבת — טבלה אחת: שורות=נתונים, עמודות=מטוסים (כל הטיסות בבת אחת) */
function renderExpanded(res, rows, calc){
  const taxLbl = state.tax === 'incl' ? 'כולל מיסי נמל' : 'ללא מיסי נמל';
  const feeLbl = state.fee ? ', כולל עמלה' : '';
  const items = rows.map(r => ({ r, c: calc(r) }));
  const empties = items.map(() => '<td></td>').join('');
  const money = v => fmt.format(v);
  const row = (label, fn, cls) =>
    `<tr class="${cls || ''}"><td class="lbl">${label}</td>` +
    items.map(({ r, c }) => `<td class="v">${fn(r, c)}</td>`).join('') + '</tr>';
  const grp = label => `<tr class="grp"><td class="lbl">${label}</td>${empties}</tr>`;

  let html = '<div class="xwrap"><table class="xtable"><thead><tr><th class="lbl">מטוס</th>' +
    items.map(({ r }) => `<th>${r.ac}<span class="th-sub">${r.route}${r.dep && r.dep !== 'TLV' ? ' · ' + r.dep : ''}</span></th>`).join('') +
    '</tr></thead><tbody>';

  html += grp('🛫 נתונים תפעוליים');
  html += row('שעות לסבב BT', r => hhmm((r.btOut || 0) + (r.btBack || 0)));
  html += row('צריכת דלק לסבב', r => r.fuelKg ? fmt.format(r.fuelKg) + ' ק"ג' : '—');
  html += row('כמות טייסים', r => r.pilots);
  html += row('כמות דיילים', r => r.att);
  html += row('מושבים למכירה', r => r.seats);
  html += row('— מזה ביזנס', r => r.seatsBiz != null ? r.seatsBiz : '—');

  html += grp(`💰 נתונים כספיים (${taxLbl}${feeLbl})`);
  html += row('עלות דלק', r => money(r.brk.fuel));
  html += row('עלות כוח אדם', r => money(r.brk.crew));
  html += row('אחזקה', r => money(r.brk.maint));
  html += row('הוצאות בארץ', r => money(r.brk.israel));
  html += row('ביטוח', r => money(r.brk.ins));
  html += row('דמי חכירה', r => money(r.brk.lease));
  html += row('הוצאות בחו"ל', r => money(r.brk.abroad));
  html += row('עלויות נוסע', r => money(r.brk.pax));
  html += row('הוצאות קבועות', r => money(r.fixed));
  html += row('ACMI *', r => money(r.fixed + r.brk.crew + r.brk.maint + r.brk.ins + r.brk.lease), 'acmi');
  html += row('סה"כ עלות טיסה — משתנות', (r, c) => money(c.varc), 'sum');
  html += row('סה"כ עלות טיסה — כולל קבועות', (r, c) => money(c.tot), 'sum');
  html += row('עלות למושב — כולל קבועות', (r, c) => money(c.perSeat), 'sum2');
  html += row('עלות למושב — משתנות', (r, c) => money(c.varPerSeat), 'sum2');

  html += '</tbody></table></div>';
  html += '<div class="xnote">* ACMI = עלויות קבועות + כוח אדם + אחזקה + ביטוח + דמי חכירה</div>';
  res.innerHTML = html;
}

/* ── ניתוק אוטומטי לאחר שעה ללא פעילות ── */
const IDLE_MS = 60 * 60 * 1000;
let idleTimer = null;
function resetIdle(){
  if (!DATA) return;                 // only while unlocked
  clearTimeout(idleTimer);
  idleTimer = setTimeout(autoLock, IDLE_MS);
}
function autoLock(){
  DATA = null;
  clearTimeout(idleTimer);
  state = { month: null, dest: null, dep: 'all', acSel: [], view: state.view, tax: 'incl', occ: 100, fee: 0, feeManual: false };
  $('results').innerHTML = '';
  $('destSearch').value = '';
  $('status').textContent = 'בחרו חודש והקלידו יעד כדי להציג את הנתונים';
  $('app').classList.add('hidden');
  $('lock').classList.remove('hidden');
  $('pw').value = '';
  $('lockErr').textContent = 'ננעל אוטומטית לאחר שעה ללא פעילות — יש להיכנס מחדש';
  $('pw').focus();
}
['mousemove','mousedown','keydown','scroll','touchstart','click'].forEach(function(ev){
  document.addEventListener(ev, resetIdle, { passive: true });
});
</script>
