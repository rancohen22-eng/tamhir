<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>ריכוז הלוואות · מחלקת חשבות</title>
<style>
  :root{
    /* ערכת מותג ארקיע */
    --bg:#f2f5f9; --card:#ffffff; --ink:#0e1c2e; --muted:#5b6b7f;
    --brand:#123a86; --brand2:#1e63b8; --accent:#0e7a4e; --line:#e2e8f0;
    --danger:#b3261e; --chip:#e8eff7; --warn:#a15c00;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,"Heebo",Arial,sans-serif;
    font-size:16px; line-height:1.45;
  }
  .hidden{display:none !important}
  button{font-family:inherit}

  /* ── מסך נעילה ── */
  #lock{
    min-height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px;
    background:linear-gradient(160deg,var(--brand) 0%,var(--brand2) 100%);
  }
  #lock .panel{
    width:100%; max-width:360px; background:var(--card); border-radius:16px;
    padding:28px 22px; box-shadow:0 10px 30px rgba(0,0,0,.25); text-align:center;
  }
  #lock .logo{width:170px; max-width:70%; height:auto; margin:2px auto 8px; display:block}
  #lock .dept{margin:0 0 2px; font-size:12.5px; color:var(--muted); letter-spacing:.02em}
  #lock h1{margin:2px 0 2px; font-size:19px; color:var(--brand); font-weight:700}
  #lock p{margin:0 0 18px; color:var(--muted); font-size:14px}
  #lock input{
    width:100%; padding:12px 14px; font-size:17px; border:1px solid var(--line);
    border-radius:10px; text-align:center; margin-bottom:10px;
  }
  #lock input:focus{outline:2px solid var(--brand2); border-color:transparent}
  #pw{direction:ltr}
  #unlockBtn{
    width:100%; margin-top:4px; padding:13px; font-size:17px; font-weight:600;
    color:#fff; background:var(--brand); border:0; border-radius:10px; cursor:pointer;
  }
  #unlockBtn:disabled{opacity:.6}
  #lockErr{color:var(--danger); font-size:14px; min-height:20px; margin-top:10px}

  /* ── כותרת ── */
  header.app{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(160deg,var(--brand) 0%,var(--brand2) 100%);
    color:#fff; padding:10px 14px 0;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  header.app .top{display:flex; align-items:center; gap:9px}
  header.app .logobadge{
    background:#fff; border-radius:8px; padding:4px 8px; line-height:0;
    box-shadow:0 1px 4px rgba(0,0,0,.15); flex:0 0 auto;
  }
  header.app .logobadge img{height:24px; width:auto; display:block}
  header.app .htxt{display:flex; flex-direction:column; line-height:1.15}
  header.app .dept{font-size:11px; opacity:.8}
  header.app h1{margin:0; font-size:17px; font-weight:700}
  header.app .spacer{margin-inline-start:auto}
  header.app .iconbtn{
    color:#fff; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.4);
    font-size:13px; font-weight:600; padding:6px 10px; border-radius:8px; cursor:pointer; white-space:nowrap;
  }
  header.app .iconbtn:active{background:#fff; color:var(--brand)}
  header.app .iconbtn.primary{background:#fff; color:var(--brand)}
  .tabs{display:flex; gap:4px; margin-top:10px}
  .tabs button{
    flex:0 0 auto; background:transparent; color:#fff; border:0; padding:9px 14px;
    font-size:14.5px; font-weight:600; cursor:pointer; border-bottom:3px solid transparent; opacity:.8;
  }
  .tabs button.sel{opacity:1; border-bottom-color:#fff}

  /* ── בקרות עליונות ── */
  .toolbar{
    background:var(--card); border-bottom:1px solid var(--line);
    padding:8px 12px; display:flex; gap:10px 14px; align-items:center; flex-wrap:wrap;
    position:sticky; top:var(--tbtop,0); z-index:15;
  }
  .toolbar .fld{display:flex; align-items:center; gap:6px; font-size:13.5px; color:var(--muted)}
  .toolbar input, .toolbar select{
    padding:6px 9px; font-size:14px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink);
  }
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden}
  .seg button{padding:6px 12px; border:0; background:#fff; font-size:13.5px; cursor:pointer; color:var(--ink)}
  .seg button.sel{background:var(--brand); color:#fff; font-weight:700}

  main{padding:12px 12px 60px; max-width:1100px; margin:0 auto}

  /* ── כרטיסי סיכום ── */
  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:14px}
  .kpi{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; box-shadow:0 1px 3px rgba(14,28,46,.05)}
  .kpi .lbl{font-size:12.5px; color:var(--muted); margin-bottom:5px}
  .kpi .val{font-size:22px; font-weight:800; color:var(--brand); line-height:1.1}
  .kpi .sub{font-size:12px; color:var(--muted); margin-top:4px}
  .kpi.accent .val{color:var(--accent)}
  .kpi.warn .val{color:var(--warn)}

  .sectitle{font-size:15px; font-weight:700; color:var(--brand); margin:16px 2px 8px; display:flex; align-items:center; gap:8px}
  .sectitle .hint{font-weight:400; font-size:12.5px; color:var(--muted)}

  /* ── טבלאות ── */
  .tblwrap{overflow-x:auto; background:var(--card); border:1px solid var(--line); border-radius:12px}
  table.grid{width:100%; border-collapse:collapse; font-size:13.5px; white-space:nowrap}
  table.grid th{background:var(--brand); color:#fff; padding:9px 10px; font-weight:600; text-align:center; font-size:12.5px; position:sticky; top:0}
  table.grid th .sub{font-weight:400; opacity:.85; font-size:10.5px; display:block}
  table.grid td{padding:8px 10px; border-bottom:1px solid var(--line); text-align:center}
  table.grid tr:last-child td{border-bottom:0}
  table.grid tbody tr:nth-child(even) td{background:#f7f9fc}
  table.grid td.r{text-align:right}
  table.grid td.num{direction:ltr; font-variant-numeric:tabular-nums}
  table.grid td.name{text-align:right; white-space:normal; min-width:150px}
  table.grid td.name b{display:block; color:var(--brand)}
  table.grid td.name .t{color:var(--muted); font-size:12px}
  table.grid td.pos{color:var(--accent); font-weight:700}
  table.grid tr.yrsep td{background:var(--chip) !important; font-weight:700; color:var(--brand); text-align:right}
  table.grid tfoot td{background:#eaf0f8 !important; font-weight:800; color:var(--brand); border-top:2px solid var(--brand)}
  tr.lrow{cursor:pointer}
  tr.lrow.open td{background:#eaf0f8 !important}
  td.exp{width:22px; color:var(--brand2); font-weight:800}
  tr.detail td{padding:0; background:#f7f9fc; text-align:right}
  .detailbox{padding:12px 14px}
  .badge{display:inline-block; padding:2px 8px; border-radius:999px; font-size:11.5px; font-weight:600; background:var(--chip); color:var(--brand)}
  .badge.cur{background:#eef7f0; color:var(--accent)}
  .miniinfo{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:8px 16px; margin-bottom:12px; font-size:13px}
  .miniinfo div span{color:var(--muted)}
  .miniinfo div b{display:block; margin-top:1px}

  .empty{background:var(--card); border:1px dashed var(--line); border-radius:12px; padding:34px 20px; text-align:center; color:var(--muted)}
  .empty h3{margin:0 0 6px; color:var(--brand)}

  .note{background:#fff8ec; border:1px solid #f0dfbb; color:var(--warn); border-radius:10px; padding:9px 12px; font-size:12.5px; margin:10px 0}

  /* ── מודל ── */
  .modal{position:fixed; inset:0; z-index:60; background:rgba(6,18,38,.55); display:flex; align-items:flex-start; justify-content:center; padding:18px; overflow-y:auto}
  .modal .box{background:var(--card); border-radius:14px; width:100%; max-width:640px; margin:auto; box-shadow:0 18px 50px rgba(0,0,0,.35)}
  .modal .mhead{display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid var(--line)}
  .modal .mhead h2{margin:0; font-size:17px; color:var(--brand)}
  .modal .mhead .x{margin-inline-start:auto; background:none; border:0; font-size:22px; color:var(--muted); cursor:pointer; line-height:1}
  .modal .mbody{padding:16px}
  .modal .mfoot{padding:12px 16px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-start; flex-wrap:wrap}
  .frow{display:grid; grid-template-columns:repeat(2,1fr); gap:12px 14px; margin-bottom:12px}
  .frow.one{grid-template-columns:1fr}
  .field label{display:block; font-size:12.5px; color:var(--muted); margin-bottom:4px; font-weight:600}
  .field input, .field select, .field textarea{
    width:100%; padding:9px 11px; font-size:15px; border:1px solid var(--line); border-radius:9px; background:#fff; color:var(--ink);
  }
  .field textarea{min-height:56px; resize:vertical}
  .field .u{font-size:11.5px; color:var(--muted); font-weight:400}
  .btn{padding:11px 18px; font-size:15px; font-weight:700; border-radius:10px; border:0; cursor:pointer}
  .btn.pri{background:var(--brand); color:#fff}
  .btn.sec{background:#eef2f7; color:var(--brand)}
  .btn.dng{background:#fbeceb; color:var(--danger)}
  .btn:disabled{opacity:.5}

  .schedbox{margin-top:8px; max-height:340px; overflow:auto; border:1px solid var(--line); border-radius:10px}
  .schedbox table{font-size:12px}

  @media(max-width:560px){
    .frow{grid-template-columns:1fr}
    header.app h1{font-size:15.5px}
    .kpi .val{font-size:19px}
  }
</style>
</head>

<script>
/* ══════════════════════════ קונפיגורציה ══════════════════════════ */
const KDF_ITERATIONS = 250000;
const STORE_KEY = 'arkia_loans_v1';

// פרטי התחברות (נוצר ע"י rekey.mjs). ברירת מחדל: hashavut / Arkia2026!
const USERS = [
  { "u": "hashavut", "s": "78k0qhc4nEaZU1goidIpNg==", "iv": "HOijrnlfKChigLmV", "w": "2UYi1nzG/w4XjA9KF+zZYoNpD4yr18W6wm7THw8hZA8QZoJQcDscI8fiL6dani7s" }
];

const CURRENCIES = ['ILS','USD','EUR','GBP','JPY','CHF','CAD','AUD'];
const CUR_SYMBOL = {ILS:'₪',USD:'$',EUR:'€',GBP:'£',JPY:'¥',CHF:'CHF',CAD:'C$',AUD:'A$'};
// יחידות ציטוט בבנק ישראל (JPY מצוטט ל-100 יח'):
const BOI_UNITS = {USD:1,EUR:1,GBP:1,JPY:100,CHF:1,CAD:1,AUD:1};

const METHODS = {
  spitzer:        'שפיצר (תשלום קבוע)',
  equal_principal:'קרן שווה',
  bullet:         'בוליט / בלון (קרן בסוף)'
};
const RATE_TYPES = {
  fixed:'ריבית קבועה',
  prime:'צמוד פריים',
  cpi:'צמוד מדד',
  var:'משתנה אחר'
};
const FREQ = { month:{m:1,ppy:12,lbl:'חודשי'}, quarter:{m:3,ppy:4,lbl:'רבעוני'}, semi:{m:6,ppy:2,lbl:'חצי-שנתי'}, year:{m:12,ppy:1,lbl:'שנתי'} };

/* ══════════════════════════ כלים כלליים ══════════════════════════ */
const $ = id => document.getElementById(id);
const el = (tag, attrs={}, html) => { const e=document.createElement(tag); for(const k in attrs) e.setAttribute(k,attrs[k]); if(html!=null) e.innerHTML=html; return e; };
const uid = () => 'l'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const nf0 = new Intl.NumberFormat('he-IL',{maximumFractionDigits:0});
const nf2 = new Intl.NumberFormat('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2});
const money = (v,cur) => (CUR_SYMBOL[cur]||'') + ' ' + nf0.format(Math.round(v||0));
const pct = v => (v==null||v==='')?'—':nf2.format(v)+'%';

function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function addMonths(dateStr, n){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1+n, d));
  // מניעת גלישת סוף-חודש
  if(dt.getUTCDate() < d && dt.getUTCDate()!==d) dt.setUTCDate(0);
  return dt.toISOString().slice(0,10);
}
function ymd(dateStr){ const [y,m,d]=dateStr.split('-').map(Number); return {y,m,d}; }
function quarterOf(m){ return Math.floor((m-1)/3)+1; }

/* ══════════════════════════ הצפנה / התחברות ══════════════════════════ */
let MASTER = null; // CryptoKey לנתונים

function b64ToBytes(b64){ const bin=atob(b64); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }
function bytesToB64(bytes){ let s=''; const a=new Uint8Array(bytes); for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]); return btoa(s); }

async function deriveWrapKey(username, password, salt){
  const km = await crypto.subtle.importKey('raw',
    new TextEncoder().encode(username.toLowerCase()+'\n'+password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:KDF_ITERATIONS, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
}
async function login(username, password){
  const entry = USERS.find(u => u.u.toLowerCase() === username.toLowerCase().trim());
  if(!entry) throw new Error('bad');
  const wrapKey = await deriveWrapKey(username, password, b64ToBytes(entry.s));
  // אם הסיסמה שגויה — פענוח ה-master ייכשל וייזרק חריג:
  const masterRaw = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64ToBytes(entry.iv) }, wrapKey, b64ToBytes(entry.w));
  MASTER = await crypto.subtle.importKey('raw', masterRaw, 'AES-GCM', false, ['encrypt','decrypt']);
}
async function encryptData(obj){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const pt = new TextEncoder().encode(JSON.stringify(obj));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv}, MASTER, pt);
  const out = new Uint8Array(iv.length + ct.byteLength);
  out.set(iv,0); out.set(new Uint8Array(ct), iv.length);
  return bytesToB64(out);
}
async function decryptData(b64){
  const raw = b64ToBytes(b64);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:raw.slice(0,12)}, MASTER, raw.slice(12));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ══════════════════════════ מצב ושמירה ══════════════════════════ */
let DATA = null;

function blankData(){ return { loans:[], fx:{ rates:{} }, settings:{ baseCurrency:'ILS', prime:6.0 }, meta:{ updatedAt:null } }; }

async function loadData(){
  const raw = localStorage.getItem(STORE_KEY);
  if(!raw){ DATA = blankData(); return; }
  try { DATA = await decryptData(raw); }
  catch(e){ DATA = blankData(); alert('לא ניתן היה לפענח את הנתונים השמורים במכשיר זה (ייתכן שנשמרו בסיסמה אחרת). מתחילים ריק.'); }
  // השלמת שדות חסרים
  DATA.fx = DATA.fx || {rates:{}}; DATA.fx.rates = DATA.fx.rates || {};
  DATA.settings = Object.assign({baseCurrency:'ILS', prime:6.0}, DATA.settings||{});
  DATA.loans = DATA.loans || [];
}
async function saveData(){
  DATA.meta = DATA.meta || {}; DATA.meta.updatedAt = new Date().toISOString();
  localStorage.setItem(STORE_KEY, await encryptData(DATA));
}

/* ══════════════════════════ מנוע לוח סילוקין ══════════════════════════ */
/* מחזיר מערך שורות: {seq,date,opening,payment,principal,interest,closing} */
function buildSchedule(loan){
  if(loan.scheduleOverride && loan.scheduleOverride.length){
    // לוח ידני — משלים יתרות
    let bal = num(loan.principal);
    return loan.scheduleOverride.map((r,i)=>{
      const p=num(r.principal), int=num(r.interest);
      const opening=bal; bal=Math.max(0,bal-p);
      return {seq:i+1, date:r.date, opening, payment:p+int, principal:p, interest:int, closing:bal, manual:true};
    });
  }
  const P = num(loan.principal);
  const f = FREQ[loan.paymentFreq] || FREQ.month;
  const term = Math.max(1, Math.round(num(loan.termMonths)));
  const n = Math.max(1, Math.round(term / f.m));                 // מס' תשלומים
  const r = (num(loan.annualRate)/100) / f.ppy;                  // ריבית לתקופה
  const grace = Math.max(0, Math.round(num(loan.graceMonths)/f.m)); // תקופות גרייס (קרן)
  let firstDate = loan.firstPaymentDate || (loan.startDate ? addMonths(loan.startDate, f.m) : todayStr());

  const rows = [];
  let bal = P;
  const method = loan.method || 'spitzer';
  const payAfterGrace = n - grace;

  // תשלום קבוע (שפיצר) על היתרה שלאחר הגרייס
  let pmt = 0;
  if(method==='spitzer'){
    const nn = Math.max(1, payAfterGrace);
    pmt = r>0 ? P * r / (1 - Math.pow(1+r,-nn)) : P/nn;
  }
  const eqPrincipal = method==='equal_principal' ? P/Math.max(1,payAfterGrace) : 0;

  for(let i=0;i<n;i++){
    const date = i===0 ? firstDate : addMonths(firstDate, f.m*i);
    const interest = bal * r;
    let principal;
    const inGrace = i < grace;
    if(inGrace){
      principal = 0;
    } else if(method==='bullet'){
      principal = (i===n-1) ? bal : 0;
    } else if(method==='equal_principal'){
      principal = Math.min(bal, eqPrincipal);
    } else { // spitzer
      principal = Math.min(bal, pmt - interest);
    }
    if(i===n-1) principal = bal; // סגירת יתרה בשורה אחרונה
    const opening = bal;
    bal = Math.max(0, bal - principal);
    rows.push({seq:i+1, date, opening, payment:principal+interest, principal, interest, closing:bal});
  }
  return rows;
}
function num(v){ const n=parseFloat(v); return isFinite(n)?n:0; }

/* יתרת קרן פתוחה לתאריך נתון */
function outstandingAt(loan, asOf){
  const sch = buildSchedule(loan);
  let bal = num(loan.principal);
  for(const row of sch){ if(row.date <= asOf) bal = row.closing; else break; }
  // לפני התשלום הראשון — הקרן המקורית
  if(sch.length && asOf < sch[0].date) bal = num(loan.principal);
  return bal;
}
/* חלות ל-12 חודשים קדימה מ-asOf: קרן + ריבית */
function maturityNext12(loan, asOf){
  const end = addMonths(asOf,12);
  const sch = buildSchedule(loan);
  let principal=0, interest=0;
  for(const row of sch){ if(row.date>asOf && row.date<=end){ principal+=row.principal; interest+=row.interest; } }
  return {principal, interest};
}

/* ══════════════════════════ מט"ח ══════════════════════════ */
/* getRate: כמה ILS ליחידת מטבע, לתאריך הקרוב ביותר שאינו אחרי asOf */
function getRate(cur, asOf){
  if(cur==='ILS') return 1;
  const arr = (DATA.fx.rates[cur]||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
  if(!arr.length) return null;
  let chosen = null;
  for(const x of arr){ if(x.date <= asOf) chosen = x; else break; }
  if(!chosen) chosen = arr[0]; // אם אין לפני התאריך — הראשון
  return chosen.rate;
}
function toBase(amount, cur, asOf){
  const base = DATA.settings.baseCurrency;
  if(cur===base) return {v:amount, ok:true};
  const rc = getRate(cur, asOf);      // ILS ליחידת cur
  const rb = getRate(base, asOf);     // ILS ליחידת base
  if(rc==null || rb==null) return {v:null, ok:false};
  return {v: amount * rc / rb, ok:true};
}
function setRate(cur, date, rate, src){
  DATA.fx.rates[cur] = DATA.fx.rates[cur] || [];
  const arr = DATA.fx.rates[cur];
  const ex = arr.find(x=>x.date===date);
  if(ex){ ex.rate=rate; ex.src=src; } else arr.push({date, rate, src});
}
/* משיכת שער יציג מבנק ישראל (best-effort; ייתכן חסימת CORS בדפדפן) */
async function fetchBOI(cur){
  if(cur==='ILS') return {ok:false, msg:'שקל — אין צורך בשער'};
  const unit = BOI_UNITS[cur]||1;
  const end = todayStr(); const start = addMonths(end,-1);
  const url = `https://edge.boi.gov.il/FusionEdgeServer/sdmx/v2/data/dataflow/BOI.STATISTICS/EXR/1.0/RER_${cur}_ILS`
            + `?startPeriod=${start}&endPeriod=${end}&format=csv`;
  const res = await fetch(url, {headers:{'Accept':'text/csv'}});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const txt = await res.text();
  const lines = txt.trim().split(/\r?\n/);
  const head = lines[0].split(',').map(s=>s.replace(/"/g,'').trim());
  const iT = head.indexOf('TIME_PERIOD'), iV = head.indexOf('OBS_VALUE');
  if(iT<0||iV<0) throw new Error('פורמט לא צפוי');
  let last=null;
  for(let i=1;i<lines.length;i++){
    const c = lines[i].split(',').map(s=>s.replace(/"/g,'').trim());
    if(c[iT] && c[iV] && !isNaN(parseFloat(c[iV]))) last={date:c[iT], rate:parseFloat(c[iV])/unit};
  }
  if(!last) throw new Error('אין נתונים');
  setRate(cur, last.date, last.rate, 'boi');
  return {ok:true, ...last};
}

function switchTab(t){

/* ══════════════════════════ דשבורד ══════════════════════════ */
function renderDash(){
  const asOf = $('asOf').value || todayStr();
  const base = DATA.settings.baseCurrency;
  const loans = DATA.loans;
  const sec = $('dash');
  if(!loans.length){
    sec.innerHTML = `<div class="empty"><h3>אין הלוואות עדיין</h3>
      <p>הוסיפו את ההלוואה הראשונה כדי לראות את הדשבורד, לוחות הסילוקין וריכוז הפרעונות.</p>
      <button class="btn pri" onclick="openEditor(null)">＋ הוספת הלוואה</button></div>`;
    return;
  }
  let totOrig=0, totOut=0, matP=0, matI=0, missing=false;
  let okOrig=0, okOut=0, okMat=0; // מונים כמה הומרו בהצלחה
  const byCur={};
  loans.forEach(l=>{
    const out = outstandingAt(l, asOf);
    const mat = maturityNext12(l, asOf);
    byCur[l.currency] = byCur[l.currency]||{orig:0,out:0};
    byCur[l.currency].orig += num(l.principal);
    byCur[l.currency].out += out;
    const co=toBase(num(l.principal),l.currency,asOf), cb=toBase(out,l.currency,asOf),
          cp=toBase(mat.principal,l.currency,asOf), ci=toBase(mat.interest,l.currency,asOf);
    if(co.ok){totOrig+=co.v; okOrig++;} else missing=true;
    if(cb.ok){totOut+=cb.v; okOut++;} else missing=true;
    if(cp.ok){matP+=cp.v; okMat++;} else missing=true;
    if(ci.ok)matI+=ci.v; else missing=true;
  });
  // אם אף המרה לא הצליחה — הצג "—" במקום 0 מטעה
  const mB = (v,okCount)=> okCount===0 ? '—' : money(v,base);

  let html = `<div class="cards">
    <div class="kpi"><div class="lbl">סך קרן מקורית</div><div class="val">${mB(totOrig,okOrig)}</div><div class="sub">${loans.length} הלוואות</div></div>
    <div class="kpi accent"><div class="lbl">יתרת קרן ליום ${fmtDate(asOf)}</div><div class="val">${mB(totOut,okOut)}</div></div>
    <div class="kpi warn"><div class="lbl">חלות קרן — 12 ח' קדימה</div><div class="val">${mB(matP,okMat)}</div><div class="sub">ריבית: ${mB(matI,okMat)}</div></div>
    <div class="kpi"><div class="lbl">מטבעות</div><div class="val" style="font-size:16px">${Object.keys(byCur).map(c=>CUR_SYMBOL[c]).join(' · ')}</div>
      <div class="sub">${Object.entries(byCur).map(([c,v])=>c+': '+money(v.out,c)).join(' | ')}</div></div>
  </div>`;
  if(missing) html += `<div class="note">⚠ חסרים שערי מט"ח לחלק מהמטבעות — הסכומים המומרים חלקיים. עדכנו שערים בלשונית "שערים".</div>`;

  html += `<div class="sectitle">טבלת הלוואות <span class="hint">לחצו על שורה לפירוט מלא ולוח סילוקין</span></div>
    <div class="tblwrap"><table class="grid"><thead><tr>
      <th></th><th class="r">הלוואה</th><th>בנק מממן</th><th>מטבע</th><th>ריבית<span class="sub">סוג · שנתית</span></th>
      <th>קרן מקורית</th><th>יתרה ליום</th><th>חלות שנה<span class="sub">קרן</span></th><th>סיום</th>
    </tr></thead><tbody>`;
  loans.forEach(l=>{
    const out=outstandingAt(l,asOf); const mat=maturityNext12(l,asOf);
    const sch=buildSchedule(l); const endD = sch.length?sch[sch.length-1].date:'—';
    html += `<tr class="lrow" data-id="${l.id}">
      <td class="exp">▸</td>
      <td class="name"><b>${esc(l.name||'—')}</b><span class="t">${esc(l.loanNumber||'')}</span></td>
      <td>${esc(l.bank||'—')}</td>
      <td><span class="badge cur">${l.currency} ${CUR_SYMBOL[l.currency]}</span></td>
      <td>${RATE_TYPES[l.rateType]||''}<br><b>${pct(l.annualRate)}</b></td>
      <td class="num">${money(num(l.principal),l.currency)}</td>
      <td class="num pos">${money(out,l.currency)}</td>
      <td class="num">${money(mat.principal,l.currency)}</td>
      <td class="num">${fmtDate(endD)}</td>
    </tr><tr class="detail hidden" data-detail="${l.id}"><td colspan="9"></td></tr>`;
  });
  html += `</tbody></table></div>`;
  sec.innerHTML = html;
  sec.querySelectorAll('tr.lrow').forEach(tr=> tr.onclick=()=>toggleDetail(tr));
}
function fmtDate(d){ if(!d||d==='—')return '—'; const {y,m,d:dd}=ymd(d); return `${String(dd).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`; }

function toggleDetail(tr){
  const id=tr.dataset.id; const det=document.querySelector(`tr[data-detail="${id}"]`);
  const open = !det.classList.contains('hidden');
  if(open){ det.classList.add('hidden'); tr.classList.remove('open'); tr.querySelector('.exp').textContent='▸'; return; }
  tr.classList.add('open'); tr.querySelector('.exp').textContent='▾';
  const l = DATA.loans.find(x=>x.id===id);
  det.querySelector('td').innerHTML = detailHTML(l);
  det.classList.remove('hidden');

/* ══════════════════════════ פרעונות (Pivot) ══════════════════════════ */
function buildRepayRows(){
  const gran = segVal('granSeg','g')||'quarter';
  const yFrom = parseInt($('yFrom').value)||1900, yTo=parseInt($('yTo').value)||2999;
  const repayCur = $('repayCur').value; // 'BASE' או מטבע
  const base = DATA.settings.baseCurrency;
  const map = new Map(); let missing=false;
  DATA.loans.forEach(l=>{
    if(repayCur!=='BASE' && l.currency!==repayCur) return;
    const sch = buildSchedule(l);
    sch.forEach(r=>{
      const {y,m}=ymd(r.date); if(y<yFrom||y>yTo) return;
      let key, label;
      if(gran==='year'){ key=`${y}`; label=`${y}`; }
      else if(gran==='quarter'){ const q=quarterOf(m); key=`${y}-${q}`; label=`${y} · רבעון ${q}`; }
      else { key=`${y}-${String(m).padStart(2,'0')}`; label=`${String(m).padStart(2,'0')}/${y}`; }
      let pr=r.principal, it=r.interest;
      if(repayCur==='BASE'){ const cp=toBase(pr,l.currency,r.date), ci=toBase(it,l.currency,r.date);
        if(!cp.ok||!ci.ok){ missing=true; } pr=cp.ok?cp.v:0; it=ci.ok?ci.v:0; }
      const o = map.get(key)||{key,label,y,principal:0,interest:0};
      o.principal+=pr; o.interest+=it; map.set(key,o);
    });
  });
  const rows = [...map.values()].sort((a,b)=> a.key<b.key?-1:a.key>b.key?1:0);
  const cur = repayCur==='BASE'?base:repayCur;
  return {rows, cur, missing, gran};
}
function renderRepay(){
  const sec=$('repay');
  if(!DATA.loans.length){ sec.innerHTML=`<div class="empty"><h3>אין נתוני פרעונות</h3><p>הוסיפו הלוואות כדי לרכז את הפרעונות.</p></div>`; return; }
  const comp = segVal('compSeg','c')||'both';
  const {rows,cur,missing} = buildRepayRows();
  let tP=0,tI=0; rows.forEach(r=>{tP+=r.principal;tI+=r.interest;});
  const showP = comp!=='interest', showI = comp!=='principal';
  const colspan = 1 + (showP?1:0) + (showI?1:0) + ((showP&&showI)?1:0);

  let head = `<tr><th class="r">תקופה</th>${showP?'<th>קרן</th>':''}${showI?'<th>ריבית</th>':''}${(showP&&showI)?'<th>קרן+ריבית</th>':''}</tr>`;
  let body=''; let lastY=null;
  rows.forEach(r=>{
    if(r.y!==lastY){ body+=`<tr class="yrsep"><td colspan="${colspan}">שנת ${r.y}</td></tr>`; lastY=r.y; }
    body+=`<tr><td class="r">${r.label}</td>
      ${showP?`<td class="num">${money(r.principal,cur)}</td>`:''}
      ${showI?`<td class="num">${money(r.interest,cur)}</td>`:''}
      ${(showP&&showI)?`<td class="num pos">${money(r.principal+r.interest,cur)}</td>`:''}</tr>`;
  });
  let foot=`<tr><td class="r">סה"כ</td>${showP?`<td class="num">${money(tP,cur)}</td>`:''}${showI?`<td class="num">${money(tI,cur)}</td>`:''}${(showP&&showI)?`<td class="num">${money(tP+tI,cur)}</td>`:''}</tr>`;

  sec.innerHTML = `<div class="sectitle">ריכוז פרעונות <span class="hint">מטבע: ${cur} ${CUR_SYMBOL[cur]}</span></div>
    ${missing?'<div class="note">⚠ חלק מהסכומים לא הומרו — חסרים שערי מט"ח. עדכנו בלשונית "שערים" או בחרו מטבע ספציפי.</div>':''}
    ${rows.length?`<div class="tblwrap"><table class="grid"><thead>${head}</thead><tbody>${body}</tbody><tfoot>${foot}</tfoot></table></div>`
      :'<div class="empty">אין פרעונות בטווח השנים שנבחר.</div>'}`;
}
function exportRepayCSV(){
  const comp = segVal('compSeg','c')||'both';
  const {rows,cur} = buildRepayRows();
  const showP = comp!=='interest', showI = comp!=='principal';
  const head=['תקופה']; if(showP)head.push('קרן'); if(showI)head.push('ריבית'); if(showP&&showI)head.push('קרן+ריבית');
  const lines=[head.join(',')];
  rows.forEach(r=>{ const c=[`"${r.label}"`]; if(showP)c.push(Math.round(r.principal)); if(showI)c.push(Math.round(r.interest)); if(showP&&showI)c.push(Math.round(r.principal+r.interest)); lines.push(c.join(',')); });
  let tP=0,tI=0; rows.forEach(r=>{tP+=r.principal;tI+=r.interest;});
  const tot=['"סה""כ"']; if(showP)tot.push(Math.round(tP)); if(showI)tot.push(Math.round(tI)); if(showP&&showI)tot.push(Math.round(tP+tI)); lines.push(tot.join(','));
  const csv='﻿'+lines.join('\r\n');
  downloadFile(csv, `repayments_${cur}_${todayStr()}.csv`, 'text/csv');
}
function downloadFile(content, name, type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=el('a',{href:url,download:name}); document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

/* ══════════════════════════ שערים ══════════════════════════ */
function renderFx(){
  const sec=$('fx'); const asOf=$('asOf').value||todayStr();
  let rowsHtml = CURRENCIES.filter(c=>c!=='ILS').map(c=>{
    const arr=(DATA.fx.rates[c]||[]).slice().sort((a,b)=>a.date<b.date?1:-1);
    const latest=arr[0];
    return `<tr>
      <td><span class="badge cur">${c} ${CUR_SYMBOL[c]}</span></td>
      <td class="num">${latest?nf2.format(latest.rate):'—'}</td>
      <td class="num">${latest?fmtDate(latest.date):'—'}</td>
      <td>${latest?(latest.src==='boi'?'בנק ישראל':'ידני'):'—'}</td>
      <td><button class="btn sec" style="padding:6px 12px" onclick="promptRate('${c}')">✎ עדכון ידני</button>
          <button class="btn sec" style="padding:6px 12px" onclick="pullBOI('${c}',this)">↧ שער יציג</button></td>
    </tr>`;
  }).join('');
  sec.innerHTML = `<div class="sectitle">שערי מט"ח <span class="hint">שער יציג (כמה ₪ ליחידת מטבע)</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <div class="fld" style="font-size:13.5px;color:var(--muted)">מטבע בסיס:
        <select id="fxBase" onchange="DATA.settings.baseCurrency=this.value;saveData();renderAll()"></select></div>
      <div class="fld" style="font-size:13.5px;color:var(--muted)">פריים נוכחי:
        <input type="number" id="primeInp" step="0.05" value="${DATA.settings.prime}" style="width:80px;padding:6px 9px;border:1px solid var(--line);border-radius:8px" onchange="DATA.settings.prime=parseFloat(this.value)||0;saveData()">%</div>
      <button class="btn pri" style="padding:8px 14px" onclick="pullAllBOI(this)">↧ משיכת כל השערים מבנק ישראל</button>
    </div>
    <div class="note">משיכת השער היציג מתבצעת ישירות מ-API של בנק ישראל בדפדפן. אם הרשת/ההגדרות חוסמות זאת (CORS), עדכנו ידנית — כל שאר המערכת פועלת כרגיל.</div>
    <div class="tblwrap"><table class="grid"><thead><tr>
      <th>מטבע</th><th>שער אחרון</th><th>תאריך</th><th>מקור</th><th>פעולות</th>
    </tr></thead><tbody>${rowsHtml}</tbody></table></div>`;
  fillCurSelect($('fxBase'), DATA.settings.baseCurrency, false);
}
function promptRate(cur){
  const v = prompt(`שער ${cur} → ${DATA.settings.baseCurrency==='ILS'?'₪':'₪'} (כמה שקלים ליחידת ${cur}):`);
  if(v==null) return; const r=parseFloat(v); if(!isFinite(r)||r<=0){ alert('ערך לא תקין'); return; }
  const d = prompt('תאריך השער (YYYY-MM-DD):', todayStr()) || todayStr();
  setRate(cur, d, r, 'manual'); saveData(); renderFx();
}
async function pullBOI(cur, btn){
  const old=btn.textContent; btn.textContent='טוען…'; btn.disabled=true;
  try{ const r=await fetchBOI(cur); await saveData(); renderFx(); }
  catch(e){ alert('לא ניתן למשוך שער מבנק ישראל עבור '+cur+' ('+e.message+'). עדכנו ידנית.'); }
  finally{ btn.textContent=old; btn.disabled=false; }
}
async function pullAllBOI(btn){
  const old=btn.textContent; btn.disabled=true; let ok=0, fail=[];
  for(const c of CURRENCIES){ if(c==='ILS')continue; btn.textContent=`טוען ${c}…`; try{ await fetchBOI(c); ok++; }catch(e){ fail.push(c); } }
  await saveData(); renderFx(); btn.disabled=false; btn.textContent=old;
  if(fail.length) alert(`נמשכו ${ok} שערים. נכשלו: ${fail.join(', ')} — ייתכן חסימת רשת/CORS. עדכנו ידנית.`);
}

/* ══════════════════════════ עריכת הלוואה ══════════════════════════ */
function openEditor(id){
  const l = id ? DATA.loans.find(x=>x.id===id) : {currency:'ILS', method:'spitzer', rateType:'fixed', paymentFreq:'month'};
  const curOpts = CURRENCIES.map(c=>`<option value="${c}" ${l.currency===c?'selected':''}>${c} ${CUR_SYMBOL[c]}</option>`).join('');
  const methOpts = Object.entries(METHODS).map(([k,v])=>`<option value="${k}" ${l.method===k?'selected':''}>${v}</option>`).join('');
  const rtOpts = Object.entries(RATE_TYPES).map(([k,v])=>`<option value="${k}" ${l.rateType===k?'selected':''}>${v}</option>`).join('');
  const freqOpts = Object.entries(FREQ).map(([k,v])=>`<option value="${k}" ${l.paymentFreq===k?'selected':''}>${v.lbl}</option>`).join('');
  const m = $('editor');
  m.innerHTML = `<div class="box"><div class="mhead"><h2>${id?'עריכת הלוואה':'הלוואה חדשה'}</h2><button class="x" onclick="closeModal('editor')">×</button></div>
    <div class="mbody">
      <div class="frow">
        <div class="field"><label>שם / תיאור ההלוואה</label><input id="f_name" value="${esc(l.name||'')}" placeholder="למשל: הלוואה לרכש מטוס"></div>
        <div class="field"><label>מספר הלוואה / חשבון</label><input id="f_num" value="${esc(l.loanNumber||'')}"></div>
      </div>
      <div class="frow">
        <div class="field"><label>בנק מממן</label><input id="f_bank" value="${esc(l.bank||'')}" placeholder="למשל: לאומי"></div>
        <div class="field"><label>מטבע</label><select id="f_cur">${curOpts}</select></div>
      </div>
      <div class="frow">
        <div class="field"><label>קרן מקורית <span class="u">(סכום ההלוואה)</span></label><input id="f_principal" type="number" step="0.01" value="${l.principal??''}"></div>
        <div class="field"><label>תאריך העמדה</label><input id="f_start" type="date" value="${l.startDate||todayStr()}"></div>
      </div>
      <div class="frow">
        <div class="field"><label>תקופה <span class="u">(חודשים)</span></label><input id="f_term" type="number" value="${l.termMonths??''}"></div>
        <div class="field"><label>תדירות תשלום</label><select id="f_freq">${freqOpts}</select></div>
      </div>
      <div class="frow">
        <div class="field"><label>שיטת החזר</label><select id="f_method">${methOpts}</select></div>
        <div class="field"><label>גרייס קרן <span class="u">(חודשים, אופציונלי)</span></label><input id="f_grace" type="number" value="${l.graceMonths??0}"></div>
      </div>
      <div class="frow">
        <div class="field"><label>סוג ריבית</label><select id="f_rt" onchange="rtChange()">${rtOpts}</select></div>
        <div class="field"><label>ריבית שנתית <span class="u">(%)</span></label><input id="f_rate" type="number" step="0.01" value="${l.annualRate??''}"></div>
      </div>
      <div class="frow" id="primeHelp" style="${l.rateType==='prime'?'':'display:none'}">
        <div class="field"><label>מרווח מעל פריים <span class="u">(%)</span></label><input id="f_margin" type="number" step="0.01" value="${l.margin??''}" oninput="applyPrime()"></div>
        <div class="field"><label>פריים נוכחי</label><input type="number" value="${DATA.settings.prime}" disabled></div>
      </div>
      <div class="frow">
        <div class="field"><label>בטוחות</label><input id="f_coll" value="${esc(l.collateral||'')}"></div>
        <div class="field"><label>מטרה</label><input id="f_purpose" value="${esc(l.purpose||'')}"></div>
      </div>
      <div class="frow one"><div class="field"><label>הערות</label><textarea id="f_notes">${esc(l.notes||'')}</textarea></div></div>
      <div class="frow one"><div class="field"><label>תצוגה מקדימה של הלוח</label>
        <div id="prev" style="font-size:12.5px;color:var(--muted)"></div></div></div>
    </div>
    <div class="mfoot">
      <button class="btn pri" onclick="saveLoan('${id||''}')">שמירה</button>
      <button class="btn sec" onclick="closeModal('editor')">ביטול</button>

  updatePrev();
}
function rtChange(){ $('primeHelp').style.display = $('f_rt').value==='prime'?'':'none'; }
function applyPrime(){ const m=parseFloat($('f_margin').value); if(isFinite(m)){ $('f_rate').value=(DATA.settings.prime+m).toFixed(2); updatePrev(); } }
function collectForm(id){
  return {
    id: id||uid(),
    name:$('f_name').value.trim(), loanNumber:$('f_num').value.trim(), bank:$('f_bank').value.trim(),
    currency:$('f_cur').value, principal:num($('f_principal').value), startDate:$('f_start').value,
    termMonths:num($('f_term').value), paymentFreq:$('f_freq').value, method:$('f_method').value,
    graceMonths:num($('f_grace').value), rateType:$('f_rt').value, annualRate:num($('f_rate').value),
    margin: $('f_margin')?num($('f_margin').value):undefined,
    collateral:$('f_coll').value.trim(), purpose:$('f_purpose').value.trim(), notes:$('f_notes').value.trim(),
    scheduleOverride: (id && DATA.loans.find(x=>x.id===id)||{}).scheduleOverride
  };
}
function updatePrev(){
  try{
    const l=collectForm(null); if(!l.principal||!l.termMonths){ $('prev').textContent='הזינו קרן ותקופה לתצוגה מקדימה'; return; }
    const sch=buildSchedule(l); const first=sch[0], last=sch[sch.length-1];
    const totI=sch.reduce((s,r)=>s+r.interest,0);
    $('prev').innerHTML = `${sch.length} תשלומים · תשלום ראשון ${fmtDate(first.date)} (${money(first.payment,l.currency)}) · סיום ${fmtDate(last.date)} · סה"כ ריבית ${money(totI,l.currency)}`;
  }catch(e){ $('prev').textContent='—'; }
}
async function saveLoan(id){
  const l=collectForm(id);
  if(!l.name){ alert('נא להזין שם הלוואה'); return; }
  if(!l.principal||!l.termMonths){ alert('נא להזין קרן ותקופה'); return; }
  const i=DATA.loans.findIndex(x=>x.id===id);
  if(i>=0) DATA.loans[i]=l; else DATA.loans.push(l);
  await saveData(); closeModal('editor'); renderAll();
}
async function deleteLoan(id){
  if(!confirm('למחוק את ההלוואה לצמיתות?')) return;
  DATA.loans=DATA.loans.filter(x=>x.id!==id); await saveData(); closeModal('editor'); renderAll();
}
function closeModal(mid){ $(mid).classList.add('hidden'); $(mid).innerHTML=''; }

/* ══════════════════════════ גיבוי / ייצוא-ייבוא ══════════════════════════ */
function openIO(){
  const m=$('ioModal');
  m.innerHTML=`<div class="box"><div class="mhead"><h2>גיבוי והעברה</h2><button class="x" onclick="closeModal('ioModal')">×</button></div>
    <div class="mbody">
      <p style="font-size:13.5px;color:var(--muted)">הנתונים נשמרים מוצפנים במכשיר זה בלבד. לגיבוי או העברה למכשיר אחר — ייצאו קובץ מוצפן, ובמכשיר היעד ייבאו אותו (נדרשת אותה סיסמה).</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin:14px 0">
        <button class="btn pri" onclick="exportEncrypted()">⬇ ייצוא קובץ מוצפן</button>
        <label class="btn sec" style="cursor:pointer">⬆ ייבוא קובץ<input type="file" accept=".enc,.txt,.json" style="display:none" onchange="importEncrypted(this)"></label>
      </div>
      <div class="note">כדי לשנות שם משתמש/סיסמה — הריצו את הקובץ <b>rekey.mjs</b> (Node) והחליפו את בלוק <b>USERS</b> ב-index.html.</div>
    </div></div>`;
  m.classList.remove('hidden');
}
async function exportEncrypted(){
  const blob = await encryptData(DATA);
  downloadFile(blob, `loans_backup_${todayStr()}.enc`, 'text/plain');
}
function importEncrypted(inp){
  const file=inp.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=async()=>{
    try{ const obj=await decryptData(rd.result.trim()); DATA=obj;
      DATA.fx=DATA.fx||{rates:{}}; DATA.settings=Object.assign({baseCurrency:'ILS',prime:6},DATA.settings||{});
      await saveData(); closeModal('ioModal'); initApp(); alert('הנתונים יובאו בהצלחה.');
    }catch(e){ alert('ייבוא נכשל — ודאו שהקובץ תואם והסיסמה זהה.'); }
  };
  rd.readAsText(file);
}
